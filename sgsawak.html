<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Sungai Sawak - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Sungai Sawak Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "sgsawak",
                "name": "Ladang Sungai Sawak",
                "reportInfo": "Data based on Agronomy Report 1/2026 (Visit 20th April 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 664.40 ha",
                            "Prime Mature (8-19 yrs): 306.10 ha",
                            "Young Mature (4-7 yrs): 334.20 ha",
                            "Immature (0-3 yrs): 24.10 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual 2025)",
                        "value": "17.58 MT",
                        "note": "Full Year 2025 (+22% increase from 2024)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne",
                        "value": "Not Available",
                        "note": "Awaiting Pinfosys / PA Report"
                    },
                    "ganoderma": {
                        "title": "Ganoderma Status",
                        "value": "Not Highlighted",
                        "note": "No critical infestation highlighted in AR."
                    },
                     "pests": {
                        "title": "Key Pests",
                        "value": "Rats & Bagworms",
                        "note": "Rat damage >26%; Localized Bagworms."
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Shortage", "value": "Short 2 Harvesters" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "High (Rats, Bagworms)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER %", "value": "Not Available" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Crop Recovery", "value": "Optimized (100%)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "15-19 days" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Manuring Status", "value": "2026 Prog 23% Active" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [693.89, 668.46, 860.12, 993.95, 931.78, 825.18, 822.35, 1084.20, 1097.60, 1114.57, 1185.52, 978.30],
                        "rainfall": [517, 116, 389.5, 200.5, 221.6, 153, 135, 201.4, 214.5, 218.5, 335, 1215],
                        "note": "*FFB production and actual rainfall data for the full year 2025 (AR Pg. 41-42)."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years (4%)", "4-7 Years (50%)", "8-19 Years (46%)", "20-25 Years (0%)", ">26 Years (0%)"],
                        "data": [4, 50, 46, 0, 0],
                        "title": "Ladang Sungai Sawak - Palm Age Distribution",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 8."
                    }
                },
                "observations": [
                    "<b>Yield Performance & Crop Recovery:</b> The estate achieved strong crop performance in 2025 with FFB production reaching 11,255.92 MT (17.58 MT/ha), a robust 22.17% improvement over 2024. Q1 2026 production stands at 2,426.39 MT (3.47 MT/ha). Crop recovery efficiency is highly optimized, hitting 100% of harvesting round targets with no significant crop loss or overripe bunches observed. <span class='observation-ref'>(AR Pg. 15, 35-37)</span>",
                    "<b>Critical Rat Infestation in Young Mature Blocks:</b> Significant rat damage has been detected in young mature plantings, escalating to 26% - 32% in Q1 2026. Control via Storm (Flocoumafen) baiting commenced in April 2026 and requires strict monitoring. While Barn Owl box occupancy is relatively high at 79% (31/39 boxes), regular maintenance of the boxes is highly recommended to strengthen integrated pest control. <span class='observation-ref'>(AR Pg. 29-31)</span>",
                    "<b>Localized Bagworm Outbreak:</b> A localized bagworm outbreak (predominantly L1 and L2 instars) was detected in blocks C4, B1, and B2. Spraying of Altacor (chlorantraniliprole 35.0% w/w) via mist blowers was executed. A post-treatment census is required one month post-application to evaluate efficacy. <span class='observation-ref'>(AR Pg. 31-32)</span>",
                    "<b>Wildlife Management (Elephants):</b> Wild elephant intrusion in Blocks P21D and P20C decreased noticeably during the first half of the year due to proactive monitoring by stationing workers near affected areas. Continuous surveillance and barrier reinforcement are mandated to maintain safety and crop security. <span class='observation-ref'>(AR Pg. 33)</span>",
                    "<b>Nutrient Inputs & Deficiencies:</b> The 2025 fertilizer program was successfully executed to 100% completion. As of March 2026, 23% of the 2026 program has been applied (Mixture B and Rock Phosphate). Mild Magnesium (Mg) and Potassium (K) deficiencies were identified in localized blocks (A3, A4, C1, D). Effective water management is required in peat soil areas to ensure optimal root nutrient uptake. <span class='observation-ref'>(AR Pg. 11-14, 21)</span>",
                    "<b>Upkeep & Canopy Management:</b> Pruning standards and progress are satisfactory; 2025 saw 100% completion (4 rounds), and 2026's first round was completed across all major blocks. Inter-row and circle weeding progress was slightly behind schedule due to rainfall disruptions late last year, but ground vegetation conditions remain fully acceptable with soft grasses dominating. <span class='observation-ref'>(AR Pg. 18, 22-25)</span>"
                ],
                "reports": {
                    "plantation": "Not Available",
                    "agronomy": {
                        "Executive Summary": "A routine agronomy visit was conducted on 20th April 2026. General agronomic performance is acceptable, with 2025 FFB yields recording a substantial 22% increase to 17.58 MT/ha compared to the previous year. However, a significant rat infestation in young mature plantings and a localized bagworm outbreak require prompt chemical intervention. Manuring, pruning, and crop recovery standards are considered satisfactory. <span class='observation-ref'>(AR Pg. 4-6, 37)</span>",
                        "Area Statement": "Total planted area is 664.40 ha. The estate benefits from an extremely favorable age profile:<br>• <b>Young Mature (4-7 years):</b> 334.20 ha (50%)<br>• <b>Prime Mature (8-19 years):</b> 306.10 ha (46%)<br>• <b>Immature (0-3 years):</b> 24.10 ha (4%).<br>Of the 3,150 supply seedlings planted last year, all survived with no signs of elephant infestation observed. <span class='observation-ref'>(AR Pg. 7-9)</span>",
                        "Nutrient Inputs & Manuring Progress": "The 2025 fertilizer program was 100% completed without significant delays. For the 2026 program, 23% (230.7 MT) has been applied as of March. The first round of Mixture B is complete, and Rock Phosphate (RP) application is currently active. EFB mulching was successfully carried out in sub-blocks A5 and A6 at a rate of 18 MT/ha. <span class='observation-ref'>(AR Pg. 11-14)</span>",
                        "Agronomic Observations": "Harvesting intervals are maintained at a satisfactory 15-19 days. Pruning for 2025 was 100% completed, and 2026 progress is acceptable with minimal over-pruning. Mild Magnesium (Mg) and Potassium (K) deficiencies were observed in localized blocks (A3, A4, C1, D), requiring careful water table management in peat soils. Weeding is slightly behind schedule but inter-row conditions remain acceptable with soft grass dominance. <span class='observation-ref'>(AR Pg. 15-28)</span>",
                        "Pest and Disease": "<b>Rats:</b> High damage (26% - 32%) was recorded in Q1 2026. Baiting with Storm (Flocoumafen) started in April. Barn owl box occupancy is 79% (31 units).<br><b>Bagworms:</b> A localized outbreak (L1/L2 instars) occurred in blocks C4, B1, and B2. Spraying with Altacor via mist blowers is ongoing.<br><b>Elephants:</b> Intrusion in P21D/P20C has decreased due to active monitoring. <span class='observation-ref'>(AR Pg. 29-34)</span>",
                        "Yield Performance": "The estate shows strong crop performance. 2025 FFB production reached 11,255.92 MT (17.58 MT/ha), marking a 22.17% improvement over 2024. Q1 2026 production yielded 2,426.39 MT (3.47 MT/ha). Crop recovery efficiency is highly optimized, hitting 100% of harvesting round targets. <span class='observation-ref'>(AR Pg. 35-37)</span>",
                        "Fertilizer Recommendation (2026)": "The 2026 fertilizer program has been revised for the second half of the year. Specific Mixture B and Rock Phosphate schedules are detailed in the appendix based on the visual and lab nutrient requirements for each block. <span class='observation-ref'>(AR Pg. 38-39)</span>"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#78350f'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            // Format details adhering strictly to the provided template screenshot structure
            function formatReportDetails(reportData) {
                if (!reportData || reportData === "Not Available") {
                    return `<p class="text-sm text-gray-600 font-medium">Not Available</p>`;
                }
                return `<div class="space-y-4">` + 
                    Object.entries(reportData).map(([section, content]) => `
                        <div>
                            <h4 class="font-bold text-gray-900 text-sm md:text-base mb-1">${section}:</h4>
                            <div class="text-sm text-gray-700 leading-relaxed">${content}</div>
                        </div>
                    `).join('') + `</div>`;
            }

            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv) agronomyDiv.innerHTML = formatReportDetails(estateData.reports.agronomy);
                if (plantationDiv) plantationDiv.innerHTML = formatReportDetails(estateData.reports.plantation);
                if (pinfosysDiv) pinfosysDiv.innerHTML = formatReportDetails(estateData.reports.pinfosys);
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Sungai Sawak';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
