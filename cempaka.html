<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Cempaka - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Cempaka Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow"></div>
        </div>
    </div>

    <script>
        // Global variable to store chart instances to allow destruction/re-initialization
        let chartInstances = {};

        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "cempaka",
                "name": "Ladang Cempaka",
                "reportInfo": "Data based on PA Report 1/2026 (Visit: 18th Feb 2026) & Agronomy Report 1/2026 (Visit: 19th Jan 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Area: 495.93 ha",
                            "Mature (P18C): 167.64 ha",
                            "New Mature (P22B): 104.08 ha",
                            "Immature (P23A): 179.28 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "27.75 / 22.67 MT",
                        "note": "Full Year 2025 (22% Above Budget)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Ex-Estate)",
                        "value": "RM 245.49 / RM 315.89",
                        "note": "Full Year 2025 (22% Below Budget)"
                    },
                    "upkeep": {
                        "title": "Upkeep Status",
                        "value": "Satisfactory",
                        "note": "Manuring 100% done; Road grading 82%"
                    },
                     "labour": {
                        "title": "Labour Deficit",
                        "value": "9 Workers",
                        "note": "Short 5 Harvesters; Ratio 1:18 ha"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:18 ha (Deficit)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Controlled (Monitoring Rats)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (Actual)", "value": "19.22% (Budget 19.00%)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": ">2.0 MT/day" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "15 Days (Satisfactory)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "2025 Program 100% Done" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [307.34, 209.34, 295.70, 314.46, 268.97, 366.24, 524.60, 554.84, 491.14, 486.12, 454.60, 379.94],
                        "rainfall": [151.0, 43.0, 138.0, 339.0, 206.0, 171.0, 0.0, 135.0, 116.5, 174.0, 265.0, 351.0],
                        "note": "*Actual FFB production and rainfall for the 2025 calendar year. (PAR 1/2026, Appx 7)"
                    },
                    "ageProfile": {
                        "labels": ["Mature (P18C)", "New Mature (P22B)", "Immature (P23A)"],
                        "data": [34, 21, 45], 
                        "title": "Ladang Cempaka - Palm Age Distribution (2026)",
                        "note": "*Source: PAR 1/2026, Pg. 10 Area Statement."
                    }
                },
                "observations": [
                    "<b>Exceptional Mature Yield (Field P18C):</b> Mature palms achieved a yield of 27.75 MT/ha in 2025, significantly outperforming the annual budget of 22.67 MT/ha (a 22% surplus). This confirms the palms have transitioned into their most productive prime stage. <span class='observation-ref'>(PAR 1/2026, Pg. 28; AR 1/2026, Pg. 36)</span>",
                    "<b>Critical Labour Deficit:</b> A workforce shortage of 9 personnel persists (25 actual vs 34 required). This includes a shortage of 5 harvesters, posing a significant risk to crop recovery as harvesting areas expand into P23A. <span class='observation-ref'>(PAR 1/2026, Pg. 4, 13)</span>",
                    "<b>Over-Pruning Incidents:</b> Severe over-pruning was observed in young palms. Management must strictly enforce the retention of a minimum of 2 subtending fronds below the lowest bunch to maintain palm health. <span class='observation-ref'>(PAR 1/2026, Pg. 5, 8; AR 1/2026, Pg. 23)</span>",
                    "<b>Suspected Ganoderma Infestation:</b> An incidence of fallen palms suspected of Ganoderma infestation was reported in Field 18C. Immediate sanitation and preventive measures are required to stop the spread. <span class='observation-ref'>(PAR 1/2026, Pg. 21-22, 39)</span>",
                    "<b>Weeding & Ground Cover:</b> While circle spraying is acceptable, growth of soft grasses and Nephrolepis should be encouraged. Volunteer Oil Palms (VOPs) and invasive species in P23A inter-rows require intensification. <span class='observation-ref'>(PAR 1/2026, Pg. 5, 18-19; AR 1/2026, Pg. 25-26)</span>",
                    "<b>Field P22B Maturation:</b> Field P22B (104.08 ha) was officially declared mature in January 2026 after reaching 36 months, with an final immature cost of RM 14,316/ha. <span class='observation-ref'>(PAR 1/2026, Pg. 34-35)</span>",
                    "<b>Infrastructure & Mechanization:</b> Road grading covered 2,386 chains (82% of budget). Management should consider acquiring an additional Timac unit for in-field collection to support expanding mature areas. <span class='observation-ref'>(PAR 1/2026, Pg. 31, 39, 45)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate's performance for 2025 is satisfactory. FFB production (4,651.78 MT) is 22% above budget, and the cost of production (RM 245.49/mt) is 22% below budget. The production volume is expected to continue increasing as harvesting areas expand and palms move into prime age. Management is urged to recruit 5 additional harvesters as immature harvesting begins in P23A. (PAR 1/2026, Pg. 8, 38)",
                        "Area Statement": "As of Dec 2025, total planted area is 451.00 ha. This comprises:\n• Mature: 167.64 ha (37.17%)\n• Immature: 283.36 ha (62.83%)\n• Effective Jan 2026, mature area increases to 271.72 ha following the maturation of Field P22B (104.08 ha). Topography is predominantly flat to undulating. (PAR 1/2026, Pg. 10, 41)",
                        "Labour Statement": "Current workforce is 25 workers vs requirement of 34 (Shortage: 9). Ratio: 1 worker per 18 ha. Additional workers are required to manage crop recovery and field maintenance.\n• Harvesters: 15 active (Requirement: 18). Deficit: 3.\n• Drivers/Loaders: 1 active (Requirement: 4). Deficit: 3.\n• Weeding: 2 active (Requirement: 4). Deficit: 2. (PAR 1/2026, Pg. 4, 13)",
                        "Staff Establishment": "Staffing is satisfactory. Manager: En. Muhammad Uzairi Bin Abdul Rahim (38). En. Muhammad Amir Asyraaf (Assistant Manager) was transferred in Jan 2026, replacing En. Mohammad Faizal. (PAR 1/2026, Pg. 12)",
                        "General Charges": "Total General Charges: RM 714,317.44 or RM 1,583.85/ha (16% below budget of RM 1,874.66).\n• Overspending noted in: MSPO (+208% due to license/CHRA fees), Security (+21% due to solar panels/wage variance), HQ Charges (+152% for overhead/China trip), SOCSO Management (+51%), and Recruitment (+36%).\n• Provident Fund (Management) overspent by 36% due to underbudgeting. (PAR 1/2026, Pg. 15-17, 48-49)",
                        "Upkeep and Cultivation": "• Weeding: Cost RM 238.32/ha (8% below budget). Circle/Selective spraying generally acceptable but rounds were fewer than budgeted. Undesirable Stenochlaena and woody species observed.\n• Manuring: 100% complete by Nov 2025. Cost RM 1,680.02/ha (6% below budget). Mid-year delay in Mix B application.\n• Pests & Diseases: RM 58.03/ha (73% below budget). Rodent damage under control; 42 owl boxes installed (100% occupancy). Suspected Ganoderma reported in fallen palms (Field 18C).\n• Drains: RM 37.01/ha (61% below budget). Desilting of 147 chains completed.\n• Road & Bridges: RM 302.62/ha (14% below budget). Grading of 2,386 chains completed (82% of target). (PAR 1/2026, Pg. 18-25, 45)",
                        "Harvesting and Collection": "YTD Cost is RM 101.64/mt, 6% lower than budget of RM 107.85.\n• Interval: Average 15 days (24 rounds in 2025). Standards and quality are satisfactory.\n• loose fruit collection being collected to platform; no unripe bunches observed. (PAR 1/2026, Pg. 27)",
                        "Crop Production": "2025 FFB Production: 4,651.78 MT (22% above budget of 3,800 MT).\n• Yield/Ha: 27.75 MT/ha vs Budget 22.67.\n• Extraction: OER at 19.22% (Budget: 19.00%), PK at 5.00% (Budget: 4.50%). (PAR 1/2026, Pg. 28)",
                        "Production Cost": "Grand Total Cost: RM 382.89/MT. Ex-Estate cost: RM 245.49/MT (22% below budget of RM 315.89).\n• General Charges: RM 57.08/mt.\n• Upkeep: RM 86.78/mt.\n• Harvesting: RM 101.64/mt. Low production cost supported by high FFB volume. (PAR 1/2026, Pg. 29-30)",
                        "Vehicles Running Cost": "• Cummins Genset (82/83): Running cost RM 10.44/hr (Below budget: RM 14.40). Average monthly running: 243-250 hrs.\n• Mini Crawler (GC7203): Running cost RM 2.86/hr. Average monthly running: 260 hrs. (PAR 1/2026, Pg. 32)",
                        "Capital Expenditure": "N/A for 2025 except for replanting costs. Total actual plantation cost: RM 1,178,519.76. (PAR 1/2026, Pg. 33)",
                        "Immature": "• Field P22B (104.08 ha): 36 months old; declared mature Jan 2026. Palm census shows 148/ha density. Final Immature Cost: RM 14,316.60/ha (excluding General Charges).\n• Field P23A (179.28 ha): 24 months old; scout harvesting began Jan 2026. Density: 139/ha. Mist blower usage discouraged due to phytotoxicity. Immature Cost todate: RM 9,955.82/ha. (PAR 1/2026, Pg. 34-37)"
                    },
                    "agronomy": {
                        "Executive Summary": "Field conditions in mature P18C are satisfactory with encouraging yield improvements (27.75 MT/ha). Key agronomic issues: Inconsistent pruning in young areas, high VOP infestation in P22, and missed rat censuses (Q2/Q4). (AR 1/2026, Pg. 4-5)",
                        "Nutrient Inputs & Manuring": "2025 program 100% completed. Application timing was disrupted mid-year by delivery issues. Strict dosage placement required for 2026 stocks. (AR 1/2026, Pg. 12-13)",
                        "Agronomic Observation": "Harvesting intervals are satisfactory. P22D yield is low (1.74 MT/ha) due to recovery issues. Pruning in P22B/D needs strict supervision to prevent excessive frond removal. (AR 1/2026, Pg. 15, 23, 37)",
                        "Yield Performance": "Mature field P18C yield was 27.75 MT/ha, a 33.9% increase year-on-year. Recovery and productivity are trending positive. (AR 1/2026, Pg. 36)",
                        "Fertilizer Recommendation": "2026 program maintained as scheduled. Ensure strict adherence to mixture and compound schedules to support prime palm health. (AR 1/2026, Pg. 39-40)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Pruning Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: PRUNE-STD-01:</b> Over-pruning is strictly prohibited. Retain at least 2 subtending fronds below the lowest bunch in young mature palms to prevent physiological stress.</p></div> <div class='policy-item'><p class='font-semibold'>Labour Management</p><p class='text-sm text-gray-600'><b>Policy Ref: HR-MANPOWER-01:</b> Estate managers must maintain the budgeted worker-to-land ratio. Shortages exceeding 10% must be reported with an active recruitment plan.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> Quarterly rat censuses are mandatory. If damage >10%, baiting must be initiated within 30 days using approved rodenticides.</p></div>"
            };

            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Upkeep') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                
                // Cleanup existing charts if they exist
                if (chartInstances[prodCanvasId]) {
                    chartInstances[prodCanvasId].destroy();
                }
                if (chartInstances[ageCanvasId]) {
                    chartInstances[ageCanvasId].destroy();
                }

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#ca8a04', '#fde047', '#facc15'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<div class="mb-4"><h4 class="font-semibold text-gray-800">${section}</h4><p class="text-sm text-gray-600 mt-1 leading-relaxed">${content}</p></div>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<div class="mb-4"><h4 class="font-semibold text-gray-800">${section}</h4><p class="text-sm text-gray-600 mt-1 leading-relaxed">${content}</p></div>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Pruning Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: PRUNE-STD-01:</b> Over-pruning is strictly prohibited. Retain at least 2 subtending fronds below the lowest bunch in young mature palms to prevent physiological stress.</p></div> <div class='policy-item'><p class='font-semibold'>Labour Management</p><p class='text-sm text-gray-600'><b>Policy Ref: HR-MANPOWER-01:</b> Estate managers must maintain the budgeted worker-to-land ratio. Shortages exceeding 10% must be reported with an active recruitment plan.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> Quarterly rat censuses are mandatory. If damage >10%, baiting must be initiated within 30 days using approved rodenticides.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Cempaka';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        // Global function for the modal close button
        window.closePolicyModal = function() {
            document.getElementById('policyModal').classList.remove('active');
        };
    </script>
</body>
</html>
