<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Sungai Gayung - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Sungai Gayung Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "sggayung",
                "name": "Ladang Sungai Gayung",
                "reportInfo": "Data based on Plantation Advisory Report 1/2026 (Visit: 13th May 2026) & Agronomy Report 1/2026 (Visit: 16th April 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,314.30 ha",
                            "Mature (>4yrs): 1,410.50 ha",
                            "Immature (0-3yr): 762.50 ha",
                            "Replanting: 141.30 ha"
                        ],
                        "note": "(PAR 1/2026 Pg. 10)"
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "4.65 / 5.29 MT",
                        "note": "YTD April 2026 (PAR 1/2026 Pg. 38)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                         "value": "RM 406.99 / RM 405.70",
                        "note": "In line with budget (PAR 1/2026 Pg. 41)"
                    },
                    "pests": {
                        "title": "Pest Concern",
                        "value": "Rats (P20A/B)",
                        "note": "Baiting carried out in 324.4 ha (PAR 1/2026 Pg. 25)"
                    },
                     "ganoderma": {
                        "title": "Ganoderma Census",
                        "value": "In Progress",
                        "note": "Continuous monitoring required for old plantings (AR 1/2026 Pg. 4, 18)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1 : 14 ha" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Rat Damage", "value": "Active Baiting (P20 Blocks)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Harvest Interval", "value": "15 days" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m-1 4h1m6-4h1m-1-4h1m-1 4h1' /></svg>", "label": "Ganoderma", "value": "Census Active" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Barn Owl Occupancy", "value": "98% (156/160 nests)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z' /></svg>", "label": "Manuring", "value": "On Schedule (309 MT)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "rainfall2025": [240, 37, 193, 316, 157, 83, 64, 92, 265, 265, 269, 611],
                        "rainfall2026": [79.50, 149.50, 39.50, 141.50, null, null, null, null, null, null, null, null],
                        "note": "*Comparison of 2025 Full Year vs 2026 YTD Rainfall (PAR 1/2026 Appx 1)."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years (Immature)", "4-7 Years (Young Mature)", "8-19 Years (Prime)", "20-25 Years (Old Mature)", ">26 Years (Old Mature)"],
                        "data": [33.3, 19.8, 0.0, 0.3, 46.6],
                        "title": "Sg Gayung - Palm Age Profile (2026)",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 12 Chart."
                    }
                },
                "observations": [
                    "<b>Ganoderma & Pest Control:</b> A full Ganoderma census is currently in progress for the old mature areas. Rat infestation in young mature blocks (P20A/B) remains a concern; a round of rat baiting has been carried out over 324.40 ha to mitigate damage. Encouragingly, barn owl occupancy is excellent at 98%. <span class='observation-ref'>(AR 1/2026 Pg. 4, 31; PAR 1/2026 Pg. 25-26)</span>",
                    "<b>Yield & Production:</b> FFB production for YTD April 2026 stood at 6,558.60 MT (20% below estimate), yielding 4.65 MT/ha. The estate is in a transitional phase with older palms scheduled for replanting. Field P20B recorded a notably low yield of 2.88 MT/ha and requires special attention to optimize productive palm density. <span class='observation-ref'>(PAR 1/2026 Pg. 38-39; AR 1/2026 Pg. 12, 39)</span>",
                    "<b>Manuring & Weeding:</b> Manuring progress is on schedule with 309.05 MT applied. The use of a semi-mechanised application has boosted worker productivity (30-35 bags/day). Weeding is slightly behind schedule, though noxious weeds have been effectively eradicated via selective spraying. <span class='observation-ref'>(PAR 1/2026 Pg. 19-24; AR 1/2026 Pg. 13-14)</span>",
                    "<b>Harvesting Standards:</b> Harvesting intervals are consistently maintained at 15 days across the estate. Overall crop recovery is satisfactory with >95% ripe bunches observed, though Harvester productivity (1.44 MT/day) is still below its full potential and requires monitoring. <span class='observation-ref'>(PAR 1/2026 Pg. 35-37; AR 1/2026 Pg. 16-17)</span>",
                    "<b>Pruning & Canopy Management:</b> Progressive pruning has been successfully carried out across all mature fields. Caution is required to prevent excessive frond removal (over-pruning) in young mature and tall palm fields, especially those vulnerable to Ganoderma. <span class='observation-ref'>(PAR 1/2026 Pg. 33-34; AR 1/2026 Pg. 20-28)</span>",
                    "<b>Replanting & Immature Management:</b> Replanting for P26G (141.3 ha) is progressing well ahead of schedule, with planting expected to finish by June 2026. Immature areas (P22C, P23D, P24E) show satisfactory growth. Scout harvesting has commenced in P22C and P23D. <span class='observation-ref'>(PAR 1/2026 Pg. 42-51; AR 1/2026 Pg. 29, 36)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Estate performance is satisfactory. FFB production (6,558.60 MT YTD April 2026) is 20% below estimate. Overall ex-estate cost (RM 406.99/MT) is in line with the budget. Key focus areas are managing rat infestations, monitoring immature growth, and accelerating replanting efforts. <span class='observation-ref'>(PAR 1/2026 Pg. 41, 54-56)</span>",
                        "Area Statement": "As of April 2026, the total planted area is <b>2,314.30 ha</b>. This comprises:<br>&bull; <b>Mature:</b> 1,410.50 ha (60.95%).<br>&bull; <b>Immature:</b> 762.50 ha (32.95%).<br>&bull; <b>Replanting:</b> 141.30 ha (6.11% in P26G). <span class='observation-ref'>(PAR 1/2026 Pg. 10-11)</span>",
                        "Labour Statement": "Current workforce is 167 workers vs requirement (Ratio 1:14 ha).<br>&bull; <b>Harvesters:</b> 68 (Ratio 1:21 ha for mature areas). Shortage of 7 harvesters noted.<br>&bull; <b>Contractors:</b> 5 contractors with 137 workers engaged for field maintenance and harvesting. <span class='observation-ref'>(PAR 1/2026 Pg. 15-16)</span>",
                        "Staff Establishment": "The staff establishment is satisfactory with 12 personnel, including 1 Manager, 2 Assistant Managers/Executives, 7 Field Supervisors, and 2 Clerks. <span class='observation-ref'>(PAR 1/2026 Pg. 13-14)</span>",
                        "General Charges": "Total General Charges are <b>RM 391.09/ha</b>, which is 30% below the budget of RM 559.17/ha.<br>&bull; <b>Overspending:</b> 'Bonus and Gratuity' (+17%), 'Upkeep Labour Quarters' (+35% for new worker mattresses), and 'ISCC' (+55% for risk assessments).<br>&bull; <b>Savings:</b> Offset by overall lower management and operational expenses. <span class='observation-ref'>(PAR 1/2026 Pg. 17-18)</span>",
                        "Upkeep and Cultivation": "&bull; <b>Weeding:</b> Cost is RM 90.89/ha (12% lower). Circle weeding completed over 1,656 ha (behind schedule).<br>&bull; <b>Manuring:</b> Cost is RM 254.77/ha (5% lower). 309.05 MT applied on schedule using semi-mechanised application.<br>&bull; <b>Pest & Disease:</b> Cost is RM 9.76/ha. Rat baiting done in 324.4 ha (P20A/B). Barn Owl occupancy high at 98%. <span class='observation-ref'>(PAR 1/2026 Pg. 19-27)</span>",
                        "Harvesting and Collection": "YTD Cost is <b>RM 113.22/MT</b>, in line with the budget.<br>&bull; <b>Infield Loading:</b> Mechanical Assisted In-Field Collection covers 1,011.50 ha with 10 machines.<br>&bull; <b>Interval:</b> Maintained at 15 days (8 rounds).<br>&bull; <b>Productivity:</b> Average harvester productivity is 1.44 MT/day. Machine productivity is <10 MT/day. <span class='observation-ref'>(PAR 1/2026 Pg. 35-37, 40)</span>",
                        "Crop Production": "YTD (4 Months) FFB Production is <b>6,558.60 MT</b>, which is 20% below the estimate of 8,203.00 MT.<br>&bull; <b>Yield/Ha:</b> 4.65 MT/ha. P98G highest at 6.79 MT/ha.<br>&bull; <b>Low Yield:</b> Field P20B recorded 2.88 MT/ha, requiring special attention. <span class='observation-ref'>(PAR 1/2026 Pg. 38)</span>",
                        "Production Cost": "YTD Cost of Production is <b>RM 406.99/MT</b>, closely aligning with the budget of RM 405.70/MT.<br>&bull; <b>General Charges:</b> RM 164.61/MT.<br>&bull; <b>Upkeep:</b> RM 129.16/MT (Overspent due to raising bunds/supplying in P20B).<br>&bull; <b>Harvesting:</b> RM 113.22/MT. <span class='observation-ref'>(PAR 1/2026 Pg. 41)</span>",
                        "Vehicles Running Cost": "Vehicle costs are generally under control. Toyota Hilux, Timac, and Hiace are below budget. John Deere (RM 11.25/hr) and Electric Ginga (RM 3.42/hr) running costs were higher than budget due to underutilization. <span class='observation-ref'>(PAR 1/2026 Pg. 53)</span>",
                        "Capital Expenditure": "Expenditure includes a computer purchase (RM 5,235). Pending quotations for an additional record-keeping room (RM 80k) and an 8-ton trailer (RM 20k). <span class='observation-ref'>(PAR 1/2026 Pg. 52)</span>",
                        "Immature": "Total 762.50 ha.<br>&bull; <b>P22C (108.2 ha):</b> Scout harvesting ongoing. Maturity extended to Jan 2027.<br>&bull; <b>P23D (181.4 ha):</b> Scout harvesting started Jan 2026. Rat & Oryctes attacks monitored.<br>&bull; <b>P24E (212.6 ha):</b> 16 mths old. Ablation scheduled Jun 2026.<br>&bull; <b>P25F (235.2 ha):</b> Planted 30,380 seedlings. Mucuna well established. <span class='observation-ref'>(PAR 1/2026 Pg. 42-49)</span>"
                    },
                    "agronomy": {
                        "Executive Summary": "Transitional age profile with >50% over-aged and immature palms. Yield YTD March 2026 declined 4% vs 2025. Main concerns are high rat infestation in P20 blocks (10%) and ongoing Ganoderma census. Manuring progress is acceptable but delivery-dependent. <span class='observation-ref'>(AR 1/2026 Pg. 4-6)</span>",
                        "Nutrient inputs/progress of manuring": "Program 74% complete for mature area; 42% for immature. Delays in Mixture B and RP due to late deliveries. Fertilizer store requires maintenance for wet floors. Productivity at 30 bags/manday. <span class='observation-ref'>(AR 1/2026 Pg. 13-15)</span>",
                        "Agronomic observation": "Harvesting intervals inconsistent in P93/P98. Rat census in P20A/B shows 10% damage (baiting required). Ganoderma incidence below threshold but census ongoing. Pruning at 94% completion; stacking standards in young mature area need improvement. <span class='observation-ref'>(AR 1/2026 Pg. 16-31)</span>",
                        "Yield performance": "YTD Mar 2026: 3.25 MT/Ha. Improvement in P20B (+37%) and P20A (+28%). Significant decline in old mature P93B (-50%) and P93A (-38%). <span class='observation-ref'>(AR 1/2026 Pg. 38-39)</span>",
                        "Fertilizer recommendation": "2026 program revised for price surges. Mixture B for older palms (broadcast at frond heap edge); Compound A for immature. CRM+RP for new planting holes. <span class='observation-ref'>(AR 1/2026 Pg. 41-45)</span>"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Pest Management (Rats)</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-RAT-01:</b> Baiting must commence if fresh damage exceeds 5%. For infestations at 10%, immediate intervention and follow-up census are mandatory.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-01:</b> All ripe bunches must be harvested. Long stalks must be cut short to optimize mill extraction (OER).</p></div> <div class='policy-item'><p class='font-semibold'>Pruning & Stacking</p><p class='text-sm text-gray-600'><b>Policy Ref: PRUNE-STD-01:</b> Over-pruning is prohibited. For young palms, retain two subtending fronds. Stacking should be 'L' or 'U' shape for accessibility.</p></div> <div class='policy-item'><p class='font-semibold'>Storage Compliance</p><p class='text-sm text-gray-600'><b>Policy Ref: STORE-FERT-02:</b> Fertilizer must be kept dry. Bags must be stacked on pallets. Wet floors or exposure to rain must be rectified to prevent caking.</p></div>"
            };

            // --- FUNCTIONS ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-emerald-50 text-emerald-800' :
                                       metric.title.includes('Pest') ? 'bg-orange-50 text-orange-800' : 'bg-red-50 text-red-800';
                    return `
                    <div class="p-4 rounded-lg ${colorClass}">
                        <h3 class="font-semibold text-sm">${metric.title}</h3>
                        ${metric.lines ? metric.lines.map(l => `<p class="text-xs font-bold">${l}</p>`).join('') : `<p class="text-2xl font-bold">${metric.value}</p>`}
                        <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-wider">${metric.note || ''}</p>
                    </div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-200 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-[10px] text-gray-500 uppercase font-semibold">${metric.label}</p><p class="font-bold text-sm">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-4 border-b pb-2">Operational & Agronomic Health</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mt-4">${keyMetricsHTML}</div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div>
                                <h3 class="text-xl font-semibold mb-2">Rainfall Trends (2025-2026)</h3>
                                <div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div>
                                <p class="text-[10px] text-center text-gray-400 mt-2">${estate.chartData.production.note}</p>
                            </div>
                            <div>
                                <h3 class="text-xl font-semibold mb-2">Transitional Age Profile</h3>
                                <div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div>
                                <p class="text-[10px] text-center text-gray-400 mt-2">${estate.chartData.ageProfile.note}</p>
                            </div>
                        </div>
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2">Critical Observations & Blended Findings</h3>
                            <ul class="list-disc list-inside space-y-3 text-gray-700 mt-4 text-sm">${observationsHTML}</ul>
                        </div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: '2025 Rainfall (mm)', data: estateData.chartData.production.rainfall2025, backgroundColor: '#cbd5e1' },
                                { label: '2026 Rainfall (mm)', data: estateData.chartData.production.rainfall2026, backgroundColor: '#3b82f6' }
                            ]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { 
                                x: { grid: { display: false } }, 
                                y: { title: { display: true, text: 'Rainfall (mm)' } } 
                            } 
                        }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ 
                                data: estateData.chartData.ageProfile.data, 
                                backgroundColor: ['#4ade80', '#fbbf24', '#cbd5e1', '#f87171', '#991b1b'] 
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } } } 
                        }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<div class="mb-3"><h4 class="font-bold text-gray-800 text-sm underline">${section.toUpperCase()}:</h4><p class="text-xs text-gray-600 leading-relaxed">${content}</p></div>`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<div class="mb-3"><h4 class="font-bold text-gray-800 text-sm underline">${section.toUpperCase()}:</h4><p class="text-xs text-gray-600 leading-relaxed">${content}</p></div>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<p class="text-xs text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        container.querySelectorAll('.details-content.active').forEach(openContent => {
                            if (openContent.id !== id) {
                                openContent.classList.remove('active');
                                document.querySelector(`[data-dropdown-id="${openContent.id}"]`).classList.remove('active');
                            }
                        });
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = estateData.policy;
            document.getElementById('modalTitle').innerText = 'Agricultural Policy Cross-Reference: Ladang Sungai Gayung';
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
