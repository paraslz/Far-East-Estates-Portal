<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Chengal - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; border-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Chengal Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300 font-semibold">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold text-gray-900">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-3xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->

                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-indigo-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "2.04 MT/day (Crawler)" },

                        "General Charges": "Total General Charges are <b>RM 1,502.52/ha</b>, which is 24% below the budget of RM 1,710.31/ha.<br><ul class='list-disc pl-5 mt-1'><li><b>Overspending:</b> 'Recruitment' (+33% due to high intake), 'Group Personal Insurance' (+32%), and 'Staff Medical' (+10%).</li><li><b>Savings:</b> Offset by strong savings in other administrative headers.</li></ul>(PA Report 2/2025, Pg. 14)",
                        "Upkeep and Cultivation": "<ul class='list-disc pl-5 mt-1'><li><b>Weeding:</b> Cost is RM 257.26/ha. Progress is satisfactory (4th round circle/selective).</li><li><b>Manuring:</b> Cost is RM 1,556.68/ha (21% over budget due to price/quantity variance). Program is 100% completed.</li><li><b>Pest & Disease:</b> Cost RM 97.56/ha. Rat damage generally <10%. Barn owl box occupancy 87%.</li></ul>(PA Report 2/2025, Pg. 16-19)",

            // --- GLOBAL VARIABLES ---

            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Manuring') ? 'bg-yellow-50 text-yellow-800' : 'bg-red-50 text-red-800';
                    
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass} h-full"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }

                    let valueHTML;
                    if (metric.value.includes(' / ')) {
                        const parts = metric.value.split(' / ');
                        const actual = parts[0];
                        const budget = parts[1];
                        
                        if (actual.startsWith('RM')) {
                             valueHTML = `
                                <p class="text-2xl font-bold">
                                    ${actual}
                                    <span class="text-xl font-semibold text-gray-600 opacity-70">/ ${budget}</span>
                                </p>`;
                        } else {
                            const budgetParts = budget.split(' ');
                            const budgetValue = budgetParts[0];
                            const budgetUnit = budgetParts.slice(1).join(' '); 
                             valueHTML = `
                                <p class="text-2xl font-bold">
                                    ${actual}
                                    <span class="text-xl font-semibold text-gray-600 opacity-70">/ ${budgetValue} ${budgetUnit}</span>
                                </p>`;
                        }
                    } else {
                        valueHTML = `<p class="text-2xl font-bold">${metric.value}</p>`;
                    }

                    return `
                        <div class="p-4 rounded-lg ${colorClass} h-full flex flex-col justify-between">
                            <div>
                                <h3 class="font-semibold mb-1">${metric.title}</h3>
                                ${valueHTML}
                            </div>
                            <p class="text-xs text-gray-600 mt-2 opacity-80 leading-tight">${metric.note}</p>
                        </div>`;
                }).join('');

                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100 shadow-sm">
                        <div class="bg-white p-2 rounded-full shadow-sm">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500 font-medium">${metric.label}</p><p class="font-bold text-lg text-gray-800">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4 mb-2">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in border-t-4 border-green-800">
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-3xl font-bold text-gray-900">${estate.name}</h2>
                        </div>
                        <p class="text-sm text-gray-500 mb-6 italic bg-gray-50 inline-block px-3 py-1 rounded">${estate.reportInfo}</p>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">
                            ${summaryMetricsHTML}
                        </div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-4 border-b border-gray-200 pb-2 text-gray-800">Key Metrics & Agronomic Status</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mt-4">
                                ${keyMetricsHTML}
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8 bg-gray-50 p-6 rounded-xl border border-gray-100">
                            <div class="bg-white p-4 rounded-lg shadow-sm">
                                <h3 class="text-lg font-semibold mb-2 text-gray-800 text-center">Monthly Production vs Rainfall (2025)</h3>
                                <div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div>
                                <p class="text-xs text-center text-gray-500 mt-3">${estate.chartData.production.note}</p>
                            </div>
                            <div class="bg-white p-4 rounded-lg shadow-sm">
                                <h3 class="text-lg font-semibold mb-2 text-gray-800 text-center">Palm Age Profile</h3>
                                <div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div>
                                <p class="text-xs text-center text-gray-500 mt-3">${estate.chartData.ageProfile.note}</p>
                            </div>
                        </div>
                        
                        <div class="mb-8 bg-yellow-50 border-l-4 border-yellow-500 p-5 rounded-r-lg">
                            <h3 class="text-xl font-semibold mb-3 text-gray-800">Key Observations & Issues</h3>
                            <ul class="list-disc list-inside space-y-1 text-gray-700">${observationsHTML}</ul>
                        </div>
                        
                        <div class="mb-8 text-center">
                            <button class="policy-modal-btn bg-green-800 text-white font-semibold px-8 py-3 rounded-full hover:bg-green-700 hover:shadow-lg transition duration-300 shadow-md flex items-center justify-center mx-auto">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                View Agricultural Policy Cross-Reference
                            </button>
                        </div>
                        
                        <div class="space-y-3">
                            <div>
                                <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-[#2d3748] text-white p-4 rounded-lg hover:bg-gray-700 transition font-medium flex justify-between items-center shadow-sm">
                                    Plantation Advisory Report Details
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                                </button>
                                <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-6 rounded-b-lg border-x border-b border-gray-200 shadow-inner mt-[-4px]"></div>
                            </div>
                            
                            <div>
                                <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-[#2d3748] text-white p-4 rounded-lg hover:bg-gray-700 transition font-medium flex justify-between items-center shadow-sm">
                                    Agronomy Report Details
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                                </button>
                                <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-6 rounded-b-lg border-x border-b border-gray-200 shadow-inner mt-[-4px]"></div>
                            </div>
                            
                            <div>
                                <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-[#2d3748] text-white p-4 rounded-lg hover:bg-gray-700 transition font-medium flex justify-between items-center shadow-sm">
                                    Pinfosys Report Details
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                                </button>
                                <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-6 rounded-b-lg border-x border-b border-gray-200 shadow-inner mt-[-4px]"></div>
                            </div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { 
                                    label: 'FFB Production (MT)', 
                                    data: estateData.chartData.production.ffb, 
                                    type: 'line', 
                                    borderColor: '#ca8a04', 
                                    backgroundColor: 'transparent', 
                                    borderWidth: 2,
                                    yAxisID: 'y-ffb', 
                                    tension: 0.4,
                                    pointBackgroundColor: '#ca8a04'
                                },
                                { 
                                    label: 'Rainfall (mm)', 
                                    data: estateData.chartData.production.rainfall, 
                                    backgroundColor: 'rgba(59, 130, 246, 0.8)', 
                                    borderRadius: 4,
                                    yAxisID: 'y-rainfall' 
                                }
                            ]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { 
                                x: { grid: { display: false } }, 
                                'y-ffb': { 
                                    type: 'linear', 
                                    position: 'left', 
                                    title: { display: true, text: 'FFB Production (MT)', font: {weight: 'bold'} } 
                                },
                                'y-rainfall': { 
                                    type: 'linear', 
                                    position: 'right', 
                                    title: { display: true, text: 'Rainfall (mm)', font: {weight: 'bold'} }, 
                                    grid: { drawOnChartArea: false } 
                                } 
                            },
                            plugins: {
                                legend: { position: 'top' }
                            }
                        }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ 
                                data: estateData.chartData.ageProfile.data, 
                                backgroundColor: ['#16a34a', '#f59e0b'], 
                                hoverOffset: 6,
                                borderWidth: 2,
                                borderColor: '#ffffff'
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            plugins: { 
                                title: { display: false }, 
                                legend: { position: 'bottom', labels: { padding: 20 } } 
                            } 
                        }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `
                        <div class="mb-5">
                            <h4 class="font-bold text-gray-900 text-lg mb-1">${section}:</h4>
                            <p class="text-sm text-gray-700 leading-relaxed">${content}</p>
                        </div>
                    `).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `
                        <div class="mb-5">
                            <h4 class="font-bold text-gray-900 text-lg mb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4>
                            <p class="text-sm text-gray-700 leading-relaxed">${content}</p>
                        </div>
                    `).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && estateData.reports.pinfosys && estateData.reports.pinfosys !== "Not Available") {
                    const expenditureTable = `
                        <div class="overflow-x-auto mt-4 rounded-lg border border-gray-200">
                            <table class="min-w-full bg-white text-sm">
                                <thead class="bg-gray-100 border-b border-gray-200">
                                    <tr>
                                        <th class="py-3 px-4 text-left font-semibold text-gray-700">Item</th>
                                        <th class="py-3 px-4 text-right font-semibold text-gray-700">Cost (RM/Ha)</th>
                                        <th class="py-3 px-4 text-right font-semibold text-gray-700">Cost (RM/Tonne)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${estateData.reports.pinfosys.expenditure.map(item => `
                                    <tr class="border-b last:border-0 hover:bg-gray-50 transition">
                                        <td class="py-2.5 px-4 font-medium text-gray-800">${item.item} <span class="text-xs text-gray-500 font-normal">(${item.category.split(' ')[0]})</span></td>
                                        <td class="py-2.5 px-4 text-right text-gray-700">${item.rm_ha}</td>
                                        <td class="py-2.5 px-4 text-right text-gray-700">${item.rm_tonne}</td>
                                    </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                    pinfosysDiv.innerHTML = `
                        <div class="mb-5">
                            <h4 class="font-bold text-gray-900 text-lg mb-1">Key Metrics:</h4>
                            <p class="text-sm text-gray-700 leading-relaxed">${estateData.reports.pinfosys.summary}</p>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-900 text-lg mb-2">Expenditure Breakdown:</h4>
                            ${expenditureTable}
                        </div>`;
                } else if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        const icon = event.currentTarget.querySelector('svg');
                        
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                        
                        if (content.classList.contains('active')) {
                            icon.style.transform = 'rotate(180deg)';
                        } else {
                            icon.style.transform = 'rotate(0deg)';
                        }
                        icon.style.transition = 'transform 0.3s ease';
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
