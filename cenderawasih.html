<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Cenderawasih - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Cenderawasih Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "cenderawasih",
                "name": "Ladang Cenderawasih",
                "reportInfo": "Data based on PA Report 1/2026 (Visit: 23rd April 2026) & Agronomy Report 1/2026 (Visit: 11th Feb 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,087.40 ha",
                            "Prime Mature: 2,079.80 ha",
                            "Immature/Replant: 7.60 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "4.58 / 4.66 MT",
                        "note": "Q1 2026 (Source: PAR)"
                    },
                    "cost": {
                        "title": "Ex-Estate Cost/MT (Actual vs Budget)",
                        "value": "RM 221.97 / RM 345.54",
                        "note": "Q1 2026 (46% below budget)"
                    },
                    "manuring": {
                        "title": "Manuring Progress",
                        "value": "Delayed (65%)",
                        "note": "Q1 2026 program impacted by weather"
                    },
                     "pests": {
                        "title": "Rat Infestation",
                        "value": ">10% (High)",
                        "note": "Immediate baiting required"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Ratio", "value": "1:23 ha (Sufficient)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Ganoderma Status", "value": "Detected (P10A)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Barn Owl Occ.", "value": "96% (163/170)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvest Interval", "value": "15 Days" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "EFB Mulching", "value": "4,533 MT Applied" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Mechanization", "value": "20 Machines" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [3194, 2192, 2663, 2992, 3268, 3839, 5165, 5992, 5870, 6197, 5767, 4977],
                        "rainfall": [232, 90, 268, 250, 174, 85, 5, 69, 97, 102, 191, 547],
                        "note": "*FFB and Rainfall data for Full Year 2025. Source: AR 1/2026 Appx 2(b) & 3."
                    },
                    "ageProfile": {
                        "labels": ["Immature (0-3)", "Prime (8-19)"],
                        "data": [0.4, 99.6],
                        "title": "Ladang Cenderawasih - Age Distribution",
                        "note": "*Source: AR 1/2026, Pg. 9."
                    }
                },
                "observations": [
                    "<b>Harvester Shortage Resolved:</b> The previous harvester shortage has been successfully addressed. The estate now deploys 90 harvesters (ratio 1:23 ha), establishing a sufficient workforce that is effectively maintaining a 15-day harvesting interval. <span class='observation-ref'>(PAR 1/2026 Pg. 12, 36)</span>",
                    "<b>High Rat Infestation Risk:</b> The March 2026 census confirms rat damage remains >10% across all fields despite previous baiting efforts. Immediate, widespread baiting (using Flocoumafen/STORM) is mandated. Barn owl occupancy remains excellent at 96% (163/170 boxes). <span class='observation-ref'>(AR Pg. 5, 38; PAR 1/2026 Pg. 25-27)</span>",
                    "<b>Q1 2026 Manuring Delays:</b> Application of the Q1 program is delayed (489.85 MT applied vs 750 MT target; 65% completion) largely due to January floods and February rains. Semi-mechanized application utilizing Badang machines is accelerating progress. <span class='observation-ref'>(AR Pg. 14; PAR 1/2026 Pg. 22-23)</span>",
                    "<b>Ganoderma & Organic Mulching:</b> Ganoderma infections continue to be managed in P10A via deboling and mounding fallen stumps. To improve soil organic health, 4,533 MT of EFB mulching was successfully applied in P10A and P17E. <span class='observation-ref'>(AR Pg. 41, 43; PAR 1/2026 Pg. 23-26)</span>",
                    "<b>Replanting Challenges (P25I / 7.6ha):</b> Replanting on 7.60 ha of reclaimed, flood-prone low-lying areas (formerly P17G) is complete with 1,125 palms planted on cambered bunds. 200 supply palms were recently planted to replace flood casualties. <span class='observation-ref'>(AR Pg. 45; PAR 1/2026 Pg. 45-46)</span>",
                    "<b>Infrastructure Delays:</b> Major road grading and resurfacing programs are delayed pending post-monsoon contractor rate agreements. Drain desilting (276 chains total) was carried out in flood-affected low-lying areas. <span class='observation-ref'>(PAR 1/2026 Pg. 28-30)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Overall estate performance is highly satisfactory. FFB yield for 2025 was 24.97 MT/ha (10% over budget), and Q1 2026 crop production is 18% higher than the same period last year. Q1 2026 cost of production is remarkably favorable at RM 221.97/MT (46% below budget). Management must now expedite delayed manuring and road works, and aggressively address persistent rat attacks. (Source: PAR 1/2026, Pg. 47-49)",
                        "Area Statement": "Total planted area is 2,087.40 ha. This comprises 2,079.80 ha of mature prime palms and 7.60 ha of immature replant (Field P25I, reclaimed from flood-prone sections of P17G). (Source: PAR 1/2026, Pg. 10, 45)",
                        "Labour Statement": "<b>Current Workforce:</b> 141 workers (26 checkroll, 115 contract). Overall ratio is 1 worker to 15 ha.<br><b>Harvesters:</b> 90 harvesters employed, bringing the ratio to 1:23 ha, which is fully sufficient. 45 foreign workers were successfully recruited against a budget of 20. (Source: PAR 1/2026, Pg. 12-16)",
                        "General Charges": "Q1 2026 total expenditure is RM 255.88/ha, which is 39% below the budget of RM 422.55. Minor overspending occurred in EPF, SOCSO, Non-Exec travel, and labour recruitment/quarters upkeep. (Source: PAR 1/2026, Pg. 14-16)",
                        "Upkeep and Cultivation": "<b>Weeding:</b> Cost is RM 38.75/ha (49% below budget). Inter-row soft grasses are establishing well.<br><b>Manuring:</b> 65% of Q1 program complete (489.85 MT) due to weather delays. Semi-mechanized application is active.<br><b>Pruning:</b> 75% complete for the schedule (Cost: RM 30.16/ha).<br><b>Pest & Disease:</b> Rat damage >10%; immediate estate-wide baiting initiated. (Source: PAR 1/2026, Pg. 17-27, 34)",
                        "Harvesting and Collection": "Harvesting intervals are maintained at 15 days (6.04 rounds completed in Q1). 20 mechanization machines are deployed (Timac/Badang average ~11 MT/day). Q1 Cost is RM 85.15/MT (3% below budget). (Source: PAR 1/2026, Pg. 36-37)",
                        "Crop Production": "Q1 2026 FFB production achieved 9,523.75 MT (slightly below 9,700 MT budget but an 18% YoY increase). Full Year 2025 yield was an impressive 24.97 MT/ha. (Source: PAR 1/2026, Pg. 39-40)",
                        "Production Cost": "Q1 2026 Ex-estate cost is RM 221.97/MT, operating 46% below the budgeted RM 345.54/MT, driven by strong crop yields. Full Year 2025 cost was RM 232.48/MT (12% below budget). (Source: PAR 1/2026, Pg. 42)",
                        "Vehicles Running Cost": "Running costs are acceptable. Manager's Hilux at RM 0.74/km (12% over budget due to fuel prices). Tractor 19 running at RM 13.48/hr (30% below budget). (Source: PAR 1/2026, Pg. 44)",
                        "Capital Expenditure": "Playground construction was completed in March 2026 for RM 25,950. Other budgeted items (bridges, solar lighting) are awaiting quotations. (Source: PAR 1/2026, Pg. 43)",
                        "Immature (Field P25I)": "7.60 hectares replanted in Oct 2025 on cambered bunds to mitigate flooding. 200 supply palms have been planted to replace post-flood casualties. RP and Fujicoat applied at planting. (Source: PAR 1/2026, Pg. 45-46)"
                    },
                    "agronomy": {
                        "Executive Summary": "Routine advisory visit conducted on 11th Feb 2026. Estate yield improved by 10% YoY to 24.97 MT/ha. Key concerns include high rat damage (>10%), Ganoderma spreading in P10A, and late fertilizer consignments for the 2026 program. Supply palm establishment was satisfactory despite elephant damage replacement. (Source: AR, Pg. 4-6, 48)",
                        "Nutrient Inputs & Progress of Manuring": "2025 program reached 100% completion (3,156.95 MT applied). 2026 program is slightly behind with first consignment of Mix B arriving 22nd Jan. Quality check in P18H5 showed satisfactory spreading (2.25 kg/palm) using Badang units, though minimal narrow-banding on frond stacks was observed. Store housekeeping is satisfactory. (Source: AR, Pg. 13-16)",
                        "Agronomic Observation": "<b>Harvesting:</b> Intervals ranged 15-20 days. Current harvester ratio is 1:30 ha against target of ~1:21 ha. Badang leads productivity at 14.11 MT/day. (Pg. 19-20). <br><b>Pruning:</b> Consistently implemented; P10A at 95% due to peak crop. Localized under-pruning in A5/A6. (Pg. 22-23). <br><b>Vegetation:</b> 2026 inter-row weeding at 11% (822 ha). Soft grasses dominant. (Pg. 30-31). <br><b>Pest/Disease:</b> Rat damage >10% in Dec census; 3,550 ha treated with Flocoumafen. Barn Owl occupancy at 97% (155 occupied boxes). Ganoderma in P10A managed via 433 mounds and 1.5m pit deboling. (Pg. 38-43).",
                        "Yield Performance": "2025 average yield at 24.97 MT/ha. Significant YoY growth in P17F and P18H (+25%) due to prime age entry. P10A declined by 7% (26.07 MT/ha). Harvesting rounds reached 99% of target (23.88 rounds). (Source: AR, Pg. 48-49)",
                        "Fertilizer Recommendation": "No amendments to 2026 program. Mixture A/B and RP dosages maintained based on yield trends. 2027 program to be formulated after Q3 visit. PR25 replants received 600g CRF and 500g RP at planting. (Source: AR, Pg. 51, 54)"
                    },
                    "pinfosys": {
                        "CEO Financial Summary (Jan 2022)": "Total Income: RM 2,128,529.12 | Estate Operating Profit: RM 1,674,787.30 | Margin: 78.7%. (Source: Pinfosys, Pg. 4)",
                        "Expenditure Table (RM/Ha)": "Upkeep & Cultivation: 62.47 (63.31/MT)<br>Manuring: 46.05 (46.77/MT)<br>Pest & Disease: 0.72 (0.73/MT)<br>Harvesting & Collection: 81.68 (82.78/MT)<br>General Charges: 41.94 (42.50/MT)<br><b>Total Estate Expenditure: 186.09 (188.60/MT)</b>"
                    }
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Rat Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If damage >10%, conduct second round within 30 days. Maintain baits at 7-day intervals until acceptance <20%.</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Sanitation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> Deboling recommended for collapsed palms (1.5m pit) to minimize inoculum build-up.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring Schedule</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All applications must follow schedule. Report delays >15 days with mitigation plan.</p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Manuring') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const renderSection = (reportObj, divId) => {
                    const div = document.getElementById(divId);
                    if (div && reportObj && reportObj !== "Not Available") {
                        div.innerHTML = Object.entries(reportObj).map(([section, content]) => 
                            `<div class="mb-4"><h4 class="font-bold text-gray-900">${section}:</h4><div class="text-sm text-gray-700 mt-1 space-y-1">${content}</div></div>`
                        ).join('');
                    } else if (div) {
                        div.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                    }
                };

                renderSection(estateData.reports.agronomy, `${estateData.id}-agronomy`);
                renderSection(estateData.reports.plantation, `${estateData.id}-plantation`);
                renderSection(estateData.reports.pinfosys, `${estateData.id}-pinfosys`);
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
