<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Cenderawasih - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="../index.html" class="flex items-center">
                    Ladang Cenderawasih Report
                </a>
            </div>
            <a href="../estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8"></div>
    </div>
    
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "cenderawasih",
                "name": "Ladang Cenderawasih",
                "reportInfo": "Data based on PA Report (Aug 2025) & Agronomy Report 1/2026. Latest Visit: 11th February 2026",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,087.40 ha",
                            "Prime Mature: 2,079.80 ha (99.6%)",
                            "Immature/Replant: 7.60 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (2025 vs 2024)",
                        "value": "24.97 / 22.71 MT",
                        "note": "10% Increase YoY"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (YTD Jul '25 vs Budget)",
                        "value": "RM 225.88 / RM 281.41",
                        "note": "20% below budget"
                    },
                    "pest": {
                        "title": "Rat Infestation",
                        "value": ">10% (High)",
                        "note": "Persistent yield risk"
                    },
                    "nutrient": {
                        "title": "Leaf Nutrient Status",
                        "value": "Suboptimal N & Mg",
                        "note": "Potassium deficiency in laterite"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' stroke-width='2'/></svg>", "label": "Harvester Ratio / Shortfall", "value": "1:30 ha (Short 27)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' stroke-width='2'/></svg>", "label": "Ganoderma", "value": "Detected (P10A)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' stroke-width='2'/></svg>", "label": "Barn Owl Occ.", "value": "97% (Average)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' stroke-width='2'/></svg>", "label": "Harvest Round", "value": "23.88 (99% Target)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M13 10V3L4 14h7v7l9-11h-7z' stroke-width='2'/></svg>", "label": "EFB Rate", "value": "50 MT/ha" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-orange-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1' stroke-width='2'/></svg>", "label": "Manuring '25", "value": "100% Complete" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [3194, 2192, 2663, 2992, 3268, 3839, 5165, 5992, 5870, 6197, 5767, 4977],
                        "rainfall": [232, 90, 268, 250, 174, 85, 5, 69, 97, 102, 191, 547],
                        "note": "*FFB and Rainfall data for Full Year 2025. Source: AR 1/2026 Appx 2(b) & 3."
                    },
                    "ageProfile": {
                        "labels": ["Immature (0-3)", "Prime (8-19)"],
                        "data": [0.4, 99.6],
                        "title": "Estate Age Profile (Dec 2025)",
                        "note": "*Source: AR 1/2026, Pg. 9."
                    }
                },
                "observations": [
                    "<b>High Rat Infestation Risk:</b> Dec 2025 census still shows damage >10% despite multiple baiting rounds. Post-treatment census is critical to evaluate effectiveness. <span class='observation-ref'>(AR Pg. 5, 38)</span>",
                    "<b>2026 Manuring Delay:</b> Early-2026 program is slightly behind due to late fertilizer delivery (first consignment Jan 22). Expedition is required to avoid schedule deviation. <span class='observation-ref'>(AR Pg. 4, 14, 50)</span>",
                    "<b>Ganoderma Management:</b> Infection symptoms (collapsed palms/frond drooping) noted in P10A. 433 palms mounded and deboling implemented to minimize inoculum. <span class='observation-ref'>(AR Pg. 5, 41, 43)</span>",
                    "<b>Severe Harvester Shortage:</b> Shortfall of 27 harvesters (69 employed vs 96 required) results in a high harvester ratio of 1:30 ha, occasionally extending intervals. <span class='observation-ref'>(AR Pg. 4, 20)</span>",
                    "<b>Nutrient Deficiencies:</b> Potassium deficiency symptoms (orange spotting) observed in laterite/sandy areas. Suboptimal N and Mg levels require close monitoring. <span class='observation-ref'>(AR Pg. 5, 28)</span>",
                    "<b>Replanting Challenges (7.6ha):</b> Monsoon floods submerged seedlings in PR251 twice. Shoot rot detected; replacement of casualties scheduled for Feb 2026. <span class='observation-ref'>(AR Pg. 6, 45)</span>",
                    "<b>Crop Quality & Recovery:</b> Harvesting standard is acceptable with low over-ripe bunches (1-2%). Mechanization (Badang) is effectively supporting field evacuation. <span class='observation-ref'>(AR Pg. 19, 21)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Overall estate performance is satisfactory. FFB yield for 2025 (24.97 MT/ha) was 10% higher than 2024. Management is urged to focus on rat control and addressing harvester shortfalls to maintain 15-day intervals. (Source: PAR, Pg. 41; AR Pg. 48)",
                        "Area Statement": "Total planted area is 2,087.40 ha. Update: 7.60 ha in Field P17G transitioned into PR251 for replanting activities. (Source: PAR, Pg. 10; AR Pg. 8)",
                        "Labour Statement": "<b>Current Workforce:</b> 136 workers (Ratio 1:15 ha). <br><b>Harvesters:</b> 69 employed vs 96 requirement (Ratio 1:30 ha). Shortfall of 27 harvesters recorded. Shortage must be resolved promptly for full crop recovery. (Source: PAR, Pg. 12-13; AR Pg. 4, 20)",
                        "Staff Establishment": "Satisfactory complement. Key movements in early 2025 included new Manager and Assistant Manager. (Source: PAR, Pg. 14)",
                        "General Charges": "YTD RM 658.22/ha, well below budget. Administrative spending is under control. (Source: PAR, Pg. 16)",
                        "Upkeep and Cultivation": "Weeding considered satisfactory. 2025 manuring program achieved 100% completion. Road and drain maintenance is ongoing. (Source: PAR, Pg. 18-31)",
                        "Harvesting and Collection": "Average harvesting interval target is 15 days, though intervals ranged 15-20 days due to labour. Mechanization (Badang) leader with 14.11 MT/day. (Source: PAR, Pg. 32-33; AR Pg. 19-20)",
                        "Crop Production": "Full year 2025 production achieved 52,123 MT, representing a 10% YoY increase. (Source: AR Appx 2b)",
                        "Production Cost": "YTD ex-estate cost RM 225.88/tonne, 20% favorable to budget. (Source: PAR, Pg. 37)",
                        "Vehicles Running Cost": "Acceptable running costs; one major tractor overhaul was necessitated. (Source: PAR, Pg. 39)",
                        "Capital Expenditure": "CAPEX on schedule. Labour Quarters construction pending final site approval. (Source: PAR, Pg. 40)",
                        "Immature": "PR251 (7.6 ha) planted Nov 2025. Flooding occurred twice; shoot rot symptoms detected in casualty palms. (Source: AR Pg. 45)"
                    },
                    "agronomy": {
                        "Executive Summary": "Routine advisory visit conducted on 11th Feb 2026. Estate yield improved by 10% YoY to 24.97 MT/ha. Key concerns include high rat damage (>10%), Ganoderma spreading in P10A, and late fertilizer consignments for the 2026 program. Supply palm establishment was satisfactory despite elephant damage replacement. (Source: AR, Pg. 4-6, 48)",
                        "Nutrient Inputs & Progress of Manuring": "2025 program reached 100% completion (3,156.95 MT applied). 2026 program is slightly behind with first consignment of Mix B arriving 22nd Jan. Quality check in P18H5 showed satisfactory spreading (2.25 kg/palm) using Badang units, though minimal narrow-banding on frond stacks was observed. Store housekeeping is satisfactory. (Source: AR, Pg. 13-16)",
                        "Agronomic Observation": "<b>Harvesting:</b> Intervals ranged 15-20 days. Current harvester ratio is 1:30 ha against target of ~1:21 ha. Badang leads productivity at 14.11 MT/day. (Pg. 19-20). <br><b>Pruning:</b> Consistently implemented; P10A at 95% due to peak crop. Localized under-pruning in A5/A6. (Pg. 22-23). <br><b>Vegetation:</b> 2026 inter-row weeding at 11% (822 ha). Soft grasses dominant. (Pg. 30-31). <br><b>Pest/Disease:</b> Rat damage >10% in Dec census; 3,550 ha treated with Flocoumafen. Barn Owl occupancy at 97% (155 occupied boxes). Ganoderma in P10A managed via 433 mounds and 1.5m pit deboling. (Pg. 38-43).",
                        "Yield Performance": "2025 average yield at 24.97 MT/ha. Significant YoY growth in P17F and P18H (+25%) due to prime age entry. P10A declined by 7% (26.07 MT/ha). Harvesting rounds reached 99% of target (23.88 rounds). (Source: AR, Pg. 48-49)",
                        "Fertilizer Recommendation": "No amendments to 2026 program. Mixture A/B and RP dosages maintained based on yield trends. 2027 program to be formulated after Q3 visit. PR25 replants received 600g CRF and 500g RP at planting. (Source: AR, Pg. 51, 54)"
                    },
                    "pinfosys": {
                        "CEO Financial Summary (Jan 2022)": "Total Income: RM 2,128,529.12 | Estate Operating Profit: RM 1,674,787.30 | Margin: 78.7%. (Source: Pinfosys, Pg. 4)",
                        "Expenditure Table": [
                            { "item": "Upkeep & Cultivation", "cost_ha": "62.47", "cost_tonne": "63.31" },
                            { "item": "&nbsp;&nbsp;Manuring", "cost_ha": "46.05", "cost_tonne": "46.77" },
                            { "item": "&nbsp;&nbsp;Pest & Disease", "cost_ha": "0.72", "cost_tonne": "0.73" },
                            { "item": "Harvesting & Collection", "cost_ha": "81.68", "cost_tonne": "82.78" },
                            { "item": "General Charges", "cost_ha": "41.94", "cost_tonne": "42.50" },
                            { "item": "<strong>Total Estate Expenditure</strong>", "cost_ha": "<strong>186.09</strong>", "cost_tonne": "<strong>188.60</strong>" }
                        ]
                    }
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Rat Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If damage >10%, conduct second round within 30 days. Maintain baits at 7-day intervals until acceptance <20%.</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Sanitation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> Deboling recommended for collapsed palms (1.5m pit) to minimize inoculum build-up.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring Schedule</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All applications must follow schedule. Report delays >15 days with mitigation plan.</p></div>"
            };

            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <div class="flex justify-between items-start">
                            <div>
                                <h2 class="text-3xl font-bold mb-2 text-gray-900">${estateData.name}</h2>
                                <p class="text-sm text-gray-500 mb-6 italic">${estateData.reportInfo}</p>
                            </div>
                            <div class="text-right">
                                <span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded uppercase">Mature</span>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">
                            ${Object.values(estateData.summaryMetrics).map(m => `
                                <div class="p-4 rounded-lg border ${m.title.includes('Area') ? 'bg-blue-50 border-blue-200 text-blue-800' : m.title.includes('Yield') ? 'bg-green-50 border-green-200 text-green-800' : 'bg-orange-50 border-orange-200 text-orange-800'}">
                                    <h3 class="font-semibold text-xs uppercase tracking-wider mb-2">${m.title}</h3>
                                    ${m.lines ? m.lines.map(l => `<p class="text-sm font-medium">${l}</p>`).join('') : `
                                        <p class="text-2xl font-bold">${m.value}</p>
                                        <p class="text-xs mt-1 opacity-75">${m.note}</p>
                                    `}
                                </div>
                            `).join('')}
                        </div>

                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-4 border-b pb-2 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-green-700" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="2"/></svg>
                                Key Metrics & Agronomic Status
                            </h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                                ${estateData.keyMetrics.map(km => `
                                    <div class="bg-gray-50 p-4 rounded-xl flex flex-col items-center text-center hover:bg-gray-100 transition">
                                        <div class="mb-2 p-2 bg-white rounded-full shadow-sm">${km.icon}</div>
                                        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-tight">${km.label}</p>
                                        <p class="font-bold text-sm text-gray-800 mt-1">${km.value}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 shadow-inner">
                                <h4 class="text-center font-bold text-gray-700 mb-4 text-sm uppercase">Monthly FFB Production vs Rainfall (2025)</h4>
                                <div class="chart-container"><canvas id="prodChart"></canvas></div>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 shadow-inner">
                                <h4 class="text-center font-bold text-gray-700 mb-4 text-sm uppercase">Palm Age Profile (Dec 2025)</h4>
                                <div class="chart-container"><canvas id="ageChart"></canvas></div>
                            </div>
                        </div>

                        <div class="mb-10">
                            <h3 class="text-xl font-semibold mb-2 border-b pb-2 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-red-700" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-width="2"/></svg>
                                Key Observations & Issues
                            </h3>
                            <ul class="grid grid-cols-1 gap-3 mt-4">
                                ${estateData.observations.map(obs => `
                                    <li class="bg-white p-3 rounded-lg border-l-4 border-orange-400 shadow-sm flex items-start text-sm">
                                        <span class="mr-3 mt-0.5 text-orange-600">•</span>
                                        <div class="text-gray-700">${obs}</div>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>

                        <div class="flex justify-center mb-10">
                            <button onclick="openPolicyModal()" class="bg-green-800 text-white px-8 py-3 rounded-full hover:bg-green-900 transition transform hover:scale-105 shadow-xl font-bold uppercase text-xs tracking-widest">
                                Policy Cross-Reference
                            </button>
                        </div>

                        <div class="space-y-4">
                            <button data-id="plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-xl flex justify-between items-center hover:bg-gray-700 transition">
                                <span class="font-bold uppercase text-xs tracking-widest">Plantation Advisory Report Details</span>
                                <span class="text-xl font-light">+</span>
                            </button>
                            <div id="plantation" class="details-content bg-white border border-gray-200 p-6 rounded-xl space-y-6 shadow-xl"></div>
                            
                            <button data-id="agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-xl flex justify-between items-center hover:bg-gray-700 transition">
                                <span class="font-bold uppercase text-xs tracking-widest">Agronomy Advisory Report Details</span>
                                <span class="text-xl font-light">+</span>
                            </button>
                            <div id="agronomy" class="details-content bg-white border border-gray-200 p-6 rounded-xl space-y-6 shadow-xl"></div>

                            <button data-id="pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-xl flex justify-between items-center hover:bg-gray-700 transition">
                                <span class="font-bold uppercase text-xs tracking-widest">Pinfosys Financial Details</span>
                                <span class="text-xl font-light">+</span>
                            </button>
                            <div id="pinfosys" class="details-content bg-white border border-gray-200 p-6 rounded-xl shadow-xl"></div>
                        </div>
                    </div>
                `;

                initCharts();
                populateDetails();
                
                document.querySelectorAll('.dropdown-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const content = document.getElementById(btn.dataset.id);
                        content.classList.toggle('active');
                        btn.querySelector('span:last-child').innerText = content.classList.contains('active') ? '−' : '+';
                    });
                });
            }

            function initCharts() {
                const prodCtx = document.getElementById('prodChart').getContext('2d');
                new Chart(prodCtx, {
                    type: 'bar',
                    data: {
                        labels: estateData.chartData.production.labels,
                        datasets: [
                            { label: 'FFB (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y', tension: 0.3, pointRadius: 4, pointBackgroundColor: '#ca8a04' },
                            { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: 'rgba(59, 130, 246, 0.7)', yAxisID: 'y1', borderRadius: 4 }
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } },
                        scales: { 
                            y: { position: 'left', title: { display: true, text: 'MT', font: { size: 10 } } }, 
                            y1: { position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'mm', font: { size: 10 } } } 
                        } 
                    }
                });

                const ageCtx = document.getElementById('ageChart').getContext('2d');
                new Chart(ageCtx, {
                    type: 'doughnut',
                    data: {
                        labels: estateData.chartData.ageProfile.labels,
                        datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#86efac', '#166534'], borderWidth: 0 }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        cutout: '65%',
                        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
                    }
                });
            }

            function populateDetails() {
                const pDiv = document.getElementById('plantation');
                pDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([k, v]) => `
                    <div class="border-b border-gray-50 pb-4 last:border-0">
                        <h4 class="font-bold text-gray-900 border-l-4 border-green-700 pl-3 mb-2 text-sm uppercase tracking-wider">${k}</h4>
                        <p class="text-sm text-gray-600 leading-relaxed pl-4">${v}</p>
                    </div>
                `).join('');

                const aDiv = document.getElementById('agronomy');
                aDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([k, v]) => `
                    <div class="border-b border-gray-50 pb-4 last:border-0">
                        <h4 class="font-bold text-gray-900 border-l-4 border-blue-700 pl-3 mb-2 text-sm uppercase tracking-wider">${k}</h4>
                        <div class="text-sm text-gray-600 leading-relaxed pl-4">${v}</div>
                    </div>
                `).join('');

                const piDiv = document.getElementById('pinfosys');
                const table = estateData.reports.pinfosys["Expenditure Table"];
                piDiv.innerHTML = `
                    <div class="p-2">
                        <p class="mb-4 text-xs font-semibold text-gray-500 uppercase">${estateData.reports.pinfosys["CEO Financial Summary (Jan 2022)"]}</p>
                        <div class="overflow-x-auto rounded-lg border border-gray-100">
                            <table class="w-full text-xs text-left">
                                <thead class="bg-gray-800 text-white">
                                    <tr><th class="p-3">Expenditure Item</th><th class="p-3 text-right">RM/Ha</th><th class="p-3 text-right">RM/Tonne</th></tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    ${table.map(r => `<tr class="hover:bg-gray-50"><td class="p-3">${r.item}</td><td class="p-3 text-right font-medium">${r.cost_ha}</td><td class="p-3 text-right font-medium">${r.cost_tonne}</td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                        <p class="text-[10px] italic mt-4 text-gray-400 text-right">Source: Pinfosys Jan 2022 Reference, Page 173</p>
                    </div>
                `;
            }

            window.openPolicyModal = () => {
                document.getElementById('modalContent').innerHTML = estateData.policy;
                document.getElementById('modalTitle').innerText = 'Agricultural Policy Cross-Reference: ' + estateData.name;
                document.getElementById('policyModal').classList.add('active');
            };
            window.closePolicyModal = () => document.getElementById('policyModal').classList.remove('active');

            renderEstate();
        });
    </script>
</body>
</html>
