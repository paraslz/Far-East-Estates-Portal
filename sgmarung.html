<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Sungai Marung - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Sungai Marung Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JS -->
        </div>
    </div>
    
    <!-- Modal for policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "sgmarung",
                "name": "Ladang Sungai Marung",
                "reportInfo": "Data based on PA Report (March 2026) & Agronomy Report (March 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,140.23 ha",
                            "Mature: 1,145.50 ha (51%)",
                            "Immature: 712.73 ha (31%)",
                            "Replanting: 282.00 ha (12%)"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "16.28 / 16.11 MT",
                        "note": "Full Year 2025 (Mature area only)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 280.79 / RM 356.02",
                        "note": "Ex-Estate Full Year 2025"
                    },
                    "ganoderma": {
                        "title": "Ganoderma Risk",
                        "value": "High in P94K",
                        "note": "Census underway; Mounding ceased in P94K"
                    },
                    "flooding": {
                        "title": "Flood Impact",
                        "value": "800 Ha Affected",
                        "note": "5 inlets; Water from neighboring plantations"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:15 ha (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' /></svg>", "label": "Harvester Productivity", "value": "3.0 MT/md (MBI/Timac/Badang)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Rat Damage", "value": "<10% (Threshold Met)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (Full Year '25)", "value": "18.98%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2-2z' /></svg>", "label": "Harvest Interval", "value": "15 days (Target Met)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z' /></svg>", "label": "2025 Manuring", "value": "100% Completed" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["2022", "2023", "2024", "2025"],
                        "ffb": [14.20, 15.03, 19.50, 16.28],
                        "rainfall": [4643, 4756, 3309, 3309],
                        "note": "*Annual FFB Yield (MT/Ha) vs Rainfall (mm) (Source: PAR 1/2026 Pg. 39, 57)."
                    },
                    "ageProfile": {
                        "labels": ["Immature (0-3)", "Young Mature (4-7)", "Prime (8-19)", "Old (20-25)", "Over-mature (>26)"],
                        "data": [31, 11, 0, 8, 50],
                        "title": "Ladang Sungai Marung - Age Profile (2026)",
                        "note": "*Profile based on revised Area Statement following P96Y replanting. (Source: PAR 1/2026 Pg. 12)."
                    }
                },
                "observations": [
                    "<b>Persistent Flooding Threat:</b> Approximately 800 ha remain flood-prone. Water from neighboring plantations and Kampung Asli flows through 5 inlets. Prolonged water stagnation in P21A, P22C, and P22D requires multi-supply of palms. <span class='observation-ref'>(PAR Pg. 10, 55, 56)</span>",
                    "<b>Ganoderma Infestation Severity:</b> Significant Ganoderma palm loss observed in tall palm fields like P94K. Census is currently underway to assess severity for upcoming replanting (2027). De-boling and shredding stumps are critical SOPs. <span class='observation-ref'>(PAR Pg. 5, 29, 55; AR Pg. 11-12)</span>",
                    "<b>Harvester & Machine Productivity:</b> High harvester productivity (3 MT/md) achieved, but machine productivity is low (10 MT/day) due to a poor ratio of 1:3.5 machine-to-harvesters. Target is 1:5 ratio to optimize cost. <span class='observation-ref'>(PAR Pg. 41; AR Pg. 17-18)</span>",
                    "<b>Overripe Bunch Loss:</b> While harvesting standards are generally satisfactory, AR identifies 5-10% overripe bunches in certain blocks (P94K) as a primary yield-limiting factor. Harvesting interval held at 15 days despite flood delays. <span class='observation-ref'>(PAR Pg. 37; AR Pg. 51-52)</span>",
                    "<b>Replanting Progress (P26H):</b> Felling, chipping, and stacking of 282 ha completed in Feb 2026. Cambered bund construction and planting are underway simultaneously. <span class='observation-ref'>(PAR Pg. 51)</span>",
                    "<b>Labour Efficiency:</b> Recruitment of 54 TKI in 2025 has stabilized the workforce at 143 (1:15 ha ratio), meeting requirements for active replanting programs. <span class='observation-ref'>(PAR Pg. 14)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Performance is satisfactory. 2025 FFB production (19,296.70 MT) exceeded budget by 2%. Ex-estate cost (RM 280.79/MT) is 21% below budget. Key issues include Ganoderma infestation reducing yield potential and chronic flooding in 800 ha impacting immature fields. (Source: PAR, Pg. 54-56)",
                        "Area Statement": "Total planted area is 2,140.23 ha. Mature area reduced to 1,145.50 ha in Jan 2026 after replanting field P96Y blocks 3-8 (282 ha). 120.50 ha now categorized as unplantable due to flood damage in P22C/E. (Source: PAR, Pg. 12)",
                        "Labour Statement": "Total of 143 workers (Ratio 1:15 ha). Includes 75 harvesters (Ratio 1:18 ha across mature and scout areas). 54 new workers recruited in 2025. (Source: PAR, Pg. 14)",
                        "Staff Establishment": "Staff complement is sufficient (12 personnel). Assistant Manager En. Ridzuan transferred in Nov 2025; Account Clerk replaced in Feb 2026. (Source: PAR, Pg. 15-16)",
                        "General Charges": "Total GC cost RM 1,190.42/ha (32% below budget). Overspending noted in Recruitment (+67% due to 66 foreign arrivals vs 30 budgeted) and MSPO/ISCC (+48% for hazard assessments). (Source: PAR, Pg. 17-18)",
                        "Upkeep and Cultivation": "<b>Weeding:</b> RM 223.20/ha (10% below budget); standards satisfactory. <br><b>Manuring:</b> RM 633.69/ha (23% below budget); 2025 program 100% completed. <br><b>P&D:</b> Rat damage <10% threshold. 107.5 chains of beneficial plants added. <br><b>Drains:</b> 470.54 chains desilted. (Source: PAR, Pg. 19-34)",
                        "Harvesting and Collection": "Cost RM 105.28/tonne (7% below budget). Harvesting interval avg 15 days with 23.58 rounds in 2025. 70% FFB sent direct to Sawira Mill. (Source: PAR, Pg. 37-38)",
                        "Crop Production": "2025 FFB production 19,296.70 MT (2% above budget). Yield 16.28 MT/ha. P05W highest (27.11 MT/ha); P96Y lowest (15.09 MT/ha) due to flood. Feb 2026 crop is 23% above budget. (Source: PAR, Pg. 39)",
                        "Production Cost": "Total Ex-Estate RM 280.79/MT (21% below budget). Components: GC (RM 95.14), Upkeep (RM 80.37), Harvesting (RM 105.28). (Source: PAR, Pg. 40)",
                        "Vehicles Running Cost": "All vehicles under budget and in good condition. School Van assisted Sg Gayung for 4 months. John Deere used mainly for FFB ramp pushing. (Source: PAR, Pg. 42)",
                        "Capital Expenditure": "Asst. Manager and staff bungalows complete but pending TNB/CF. Boat & engine received July 2025 for flood management. (Source: PAR, Pg. 52-53)",
                        "Immature": "<b>P21A (138 ha):</b> 4,776 palms supplied to flood-damaged areas; scout harvesting yielded 245 MT. <br><b>P22D (105 ha):</b> 1,650 palms supplied; scout harvesting yielded 318 MT. <br><b>P25G (206 ha):</b> 29,086 palms planted; field interplanted with watermelon. (Source: PAR, Pg. 43-50)"
                    },
                    "agronomy": {
                        "Executive Summary (Visited 3 Mar 2026)": "Yield in 2025 (16.88 MT/ha) dropped 13.6% vs 2024. Primary limiting factors: overripe bunches causing yield loss, chronic flooding (318 ha), and high Ganoderma risk in old stands (47% area >26 years). (Source: AR Pg. 4-6, 50)",
                        "Nutrient Inputs & Fertilizer Issues": "2025 program 100% completed by Nov 2025 despite flood delays. 2026 program started but delayed by heavy Jan-Mar rainfall. Investigation needed for wet floor in fertilizer store. EFB application not commenced; priority to lateritic soils. (Source: AR Pg. 13-14, 16)",
                        "Agronomic Observations": "<b>Harvesting:</b> Significant overripe bunches (5-10% in P94K5/K8/K9). Rotten bunches in P96Y2. <br><b>Pruning:</b> Progressive pruning in tall palms improved but dry hanging fronds still present. <br><b>Weeding:</b> Borderline acceptable. 52% area has sparse patches between soft vegetation. Woody weeds (Clidemia) in interrows. <br><b>Pest:</b> Barn owl box occupancy 90%. Rat damage <10% in mature, but 13.4% in P21B young mature before baiting. (Source: AR Pg. 17-34)",
                        "Immature/Young Mature Plantings": "<b>P21A3:</b> Over-pruning noted; keep 2 fronds below lowest whorl. <br><b>P21B/P21A:</b> Rat damage >12%; monthly baiting needed. <br><b>P21A2:</b> Mud on shoots after flood must be splash-cleaned to prevent rot. <br><b>P24F:</b> Mucuna well established. LLDPE weed-mulch used; soil moisture monitoring required as mulch may impede rain infiltration. (Source: AR Pg. 35-41)",
                        "Yield Performance": "2025 Yield: 16.88 MT/ha vs 2024: 19.50 MT/ha. Decline due to flooding in Mar-Apr '25 causing 40-day downtime in 318 ha. Harvesting standard improvement critical to reduce field losses. (Source: AR Pg. 50-52)",
                        "Fertilizer Recommendation (2026)": "Revised program in Appendix 1. No manuring for blocks replanting in 2026/27. For new planting, apply 600g CRF + 500g RP in hole. (Source: AR Pg. 55-59)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma SOP (Replanting)</p><p class='text-sm text-gray-600'><b>Policy Ref: GANO-SOP-26:</b> In areas with >10% infection, de-bole palms with 1.5m x 1.5m x 1.5m pits. Expose to sunlight for 2-3 months before backfilling.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting & Pruning (Young Palms)</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-05:</b> For palms <15 years, maintain two fronds below the lowest bunch whorl to support photosynthesis and evapotranspiration.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring Priority</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-PRIORITY-01:</b> During weather delays, prioritize young mature (4-7 yrs) and prime palms (8-19 yrs) over old stands due to higher nutrient demand.</p></div>"
            };

            const container = document.getElementById('selected-estate-container');
            let chartInstances = {};

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800 border-blue-200' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800 border-green-200' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800 border-orange-200' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800 border-red-200' : 'bg-yellow-50 text-yellow-800 border-yellow-200';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass} border shadow-sm"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass} border shadow-sm"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100 shadow-sm">
                        <div class="bg-white p-2 rounded-full border border-gray-200">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500 font-medium">${metric.label}</p><p class="font-bold text-lg leading-tight">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in border border-gray-200">
                        <h2 class="text-3xl font-bold mb-1 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic font-medium">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Annual Yield vs Rainfall</h3><div class="chart-container border border-gray-100 p-2 rounded-md"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container border border-gray-100 p-2 rounded-md"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8 bg-gray-50 p-4 rounded-lg border border-gray-200"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Blended Observations & Critical Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md font-bold">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-3">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-slate-700 text-white p-4 rounded-md hover:bg-slate-800 transition flex justify-between items-center font-bold shadow-sm">Plantation Advisory Report Details (March 2026) <span class="text-xl">▼</span></button>
                            <div id="${estate.id}-plantation" class="details-content bg-white p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-slate-700 text-white p-4 rounded-md hover:bg-slate-800 transition flex justify-between items-center font-bold shadow-sm">Agronomy Report Details (March 2026) <span class="text-xl">▼</span></button>
                            <div id="${estate.id}-agronomy" class="details-content bg-white p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-slate-700 text-white p-4 rounded-md hover:bg-slate-800 transition flex justify-between items-center font-bold shadow-sm">Pinfosys Report Details (CEO Summary) <span class="text-xl">▼</span></button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-white p-6 rounded-md border border-gray-200 shadow-inner"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Yield (MT/Ha)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4, borderWidth: 3 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: 'rgba(59, 130, 246, 0.7)', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Yield (MT/Ha)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }
                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#22c55e', '#fbbf24', '#f59e0b', '#f97316', '#ef4444'], hoverOffset: 10 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 15 } } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-800 border-l-4 border-green-700 pl-2 mb-1">${section}:</h4><div class="text-sm text-gray-600 leading-relaxed">${content}</div></div>`).join('');
                }
                if (plantationDiv) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-800 border-l-4 border-blue-700 pl-2 mb-1">${section}:</h4><div class="text-sm text-gray-600 leading-relaxed">${content}</div></div>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600 italic">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Ganoderma SOP (Replanting)</p><p class='text-sm text-gray-600'><b>Policy Ref: GANO-SOP-26:</b> In areas with >10% infection, de-bole palms with 1.5m x 1.5m x 1.5m pits. Expose to sunlight for 2-3 months before backfilling.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting & Pruning (Young Palms)</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-05:</b> For palms <15 years, maintain two fronds below the lowest bunch whorl to support photosynthesis and evapotranspiration.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring Priority</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-PRIORITY-01:</b> During weather delays, prioritize young mature (4-7 yrs) and prime palms (8-19 yrs) over old stands due to higher nutrient demand.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Sungai Marung';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
