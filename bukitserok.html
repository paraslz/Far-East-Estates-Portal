<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Bukit Serok - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="../index.html" class="flex items-center">
                    Ladang Bukit Serok Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "bukitserok",
                "name": "Ladang Bukit Serok",
                "reportInfo": "Data based on PA Report (October 2025) & Agronomy Report (February 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,226.40 ha",
                            "Mature: 2,058.80 ha",
                            "Prime Age (8-19y): 63%"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual 2025)",
                        "value": "24.89 MT/ha",
                        "note": "8.3% Decline vs 2024 (AR Pg. 43)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (YTD Sept)",
                        "value": "RM 199.77",
                        "note": "Budget: RM 285.23 (PAR Pg. 47)"
                    },
                    "labour": {
                        "title": "Labour Status",
                        "value": "Adequate Ratio",
                        "note": "Ratio > 1:102 ha (AR Pg. 19)"
                    },
                     "pests": {
                        "title": "P&D Status",
                        "value": "Rats Controlled",
                        "note": "Bagworm Suppressed (AR Pg. 5)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Status", "value": "154 Workers (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Ganoderma Incidence Low" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (YTD)", "value": "19.34% (Sept 2025)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Mech. Prod.", "value": "Crawler: 6.4 MT/day" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "24 Rounds/Year (AR Pg. 44)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "Marginal Mg, Ca & K" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [2825, 2243, 3126, 4262, 4769, 5427, 5519, 5639, 5803, 5763, 5565, 4479],
                        "rainfall": [232, 151, 97, 289, 155, 83, 30, 125, 122, 141, 366, 315],
                        "note": "*FFB Production (MT) and Rainfall (mm) data for full year 2025. Source: AR Pg. 50-51."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years", "4-7 Years", "8-19 Years (Prime)", "20-25 Years (Old)", ">26 Years"],
                        "data": [0, 0, 63, 37, 0],
                        "title": "Ladang Bukit Serok - Palm Age Distribution (2025)",
                        "note": "*Source: AR Pg. 10."
                    }
                },
                "observations": [
                    "<b>Completion of 2025 Manuring:</b> The 2025 manuring program was fully completed by December despite early procurement delays. 2026 progress stands at 14.5% as of February. <span class='observation-ref'>(AR Pg. 4, 13)</span>",
                    "<b>Under-pruning in Tall Palm Areas:</b> Approximately 110 ha in blocks P01A and P02B remain under-pruned. This accumulation of excess fronds reduces harvesting efficiency and increases crop loss risks. <span class='observation-ref'>(AR Pg. 4, 22; PAR Pg. 47)</span>",
                    "<b>Bagworm Control & Monitoring:</b> Previous infestations in P08L and P09C were chemically controlled (Trunk injection with Monocrotophos). No fresh defoliation symptoms were observed. <span class='observation-ref'>(AR Pg. 5, 41)</span>",
                    "<b>Rat Infestation Levels:</b> Rat population is currently below critical levels (<10%) in most areas, though P12M required a second round of baiting due to local spikes. Barn owl box occupancy is high at 87%. <span class='observation-ref'>(AR Pg. 5, 37-38)</span>",
                    "<b>Field Infrastructure (Roads):</b> While road grading is 82% complete, the lack of laterite surfacing remains a concern for soggy stretches, potentially impacting evacuation during peak rains. <span class='observation-ref'>(PAR Pg. 46, 48)</span>",
                    "<b>Nutrient Management on Sandy Soils:</b> Palms on sandy/lateritic soils show weaker vigour. Mulching with EFB (applied at 50 MT/ha in P02B2) is recommended to improve moisture and CEC. <span class='observation-ref'>(AR Pg. 16, 27)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Performance is acceptable. YTD FFB production (37,056 MT) is 19% higher than budget. Production cost (RM 199.77/MT) is 30% lower than budget. Management urged to focus on increasing Barn Owl occupancy and establishing beneficial plants. (Source: PAR Pg. 46-48)",
                        "Area Statement": "Total planted area is 2,226.40 ha. This comprises 100% Mature Palms. Replanting for A4 and A5 is scheduled for 2027. (Source: PAR Pg. 10)",
                        "Labour Statement": "Total workforce is 154 (122 Checkroll, 22 Contract). Ratio is ~1:14 ha. Shortage of 8 harvesters noted in late 2025. (Source: PAR Pg. 12)",
                        "Staff Establishment": "Staff complement is satisfactory with 5 personnel. New Cadet Executive appointed in July 2025. Manager stationed at Machap Estate. (Source: PAR Pg. 14)",
                        "General Charges": "Total General Charges are RM 819/ha, 2% below budget. Overspending in 'Executive Vehicle Running' due to Hilux repairs. (Source: PAR Pg. 16)",
                        "Upkeep and Cultivation": "Weeding cost (RM 153.36/ha) is 11% below budget. Road grading is 82% complete but lacks laterite surfacing. Manuring progress was 73% complete by Oct 2025. (Source: PAR Pg. 18-34)",
                        "Harvesting and Collection": "Cost per tonne (RM 46.29) is acceptable. Mechanization includes 10 Mini E-Crawlers and MB units. Interval maintained at 15 days. (Source: PAR Pg. 35, 41)",
                        "Crop Production": "YTD (Sept 2025) FFB Production is 37,056 MT, 19% above budget. Extraction OER at 19.34%. (Source: PAR Pg. 39)",
                        "Production Cost": "YTD Cost is RM 199.77/MT, which is 30% favorable compared to budget. (Source: PAR Pg. 43)",
                        "Vehicles Running Cost": "Hilux cost 3% above budget. Tractor running cost 36% lower than budget. (Source: PAR Pg. 45)",
                        "Capital Expenditure": "N/A - Routine maintenance only. Drain desilting carried out using backhoe. (Source: PAR Pg. 44)",
                        "Immature": "N/A - 100% Mature Estate. (Source: PAR Pg. 10)"
                    },
                    "agronomy": {
                        "Executive Summary": "Visit conducted 4th Feb 2026. The blocking system remains satisfactory with replanting scheduled for 2027. The 2025 manuring program was fully completed despite early delays. Average yield for 2025 declined by 8.3% compared to 2024. Key issues include under-pruning in 110 ha of tall palms and managing localized pest outbreaks. (Source: AR Pg. 4-7)",
                        "Nutrient Inputs/Progress of Manuring": "2025 program (3,038.90 Tonnes) was 100% applied by Dec 2025. For H1 2026, progress is at 14.5% (221.65 MT applied). Kieserite application is most advanced at 85.7% completion. EFB application in P02B2 totalled 14,487 MT at a rate of 50 MT/ha across 289 ha. Fertilizer storage conditions were found proper on pallets. (Source: AR Pg. 12-17)",
                        "Agronomic Observation": "<b>Harvesting:</b> Semi-mechanized crawler productivity is 6.44 MT/day, while Mechanical Badang (MB) units achieve 11.23 MT/day. Harvester strength is adequate (Ratio > 1:102 ha). <b>Pruning:</b> 72% target met in 2025, but blocks P01A and P02B (tall palms) show significant under-pruning affecting recovery. <b>P&D:</b> Rat damage in P12M exceeded the 10% threshold, prompting baiting. Barn owl occupancy stands at 87% (141/162 boxes). Bagworm infestation in P08L/P09C was suppressed with trunk injection. Ganoderma sanitation via deboling pits (1.5m³) is satisfactory in P04J. (Source: AR Pg. 18-42)",
                        "Yield Performance": "Full year 2025 yield recorded at 24.89 MT/ha, compared to 27.14 MT/ha in 2024. Sharpest declines noted in P07K (-25.5%), P10D (-24.0%), and P08L (-23.9%). Cumulative harvesting rounds target of 24 rounds per year was 100% achieved across the estate. (Source: AR Pg. 43-44, 50)",
                        "Fertilizer Recommendation": "2026 program maintained without amendments. Manuring for blocks A4 and A5 has been withdrawn in anticipation of 2027 replanting. NK 2 application (2.50 kg/palm) specified for Field P01 blocks. 2027 recommendations to follow field inspection in H2 2026. (Source: AR Pg. 46-49)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Pest & Disease Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-01:</b> Damage >10% triggers mandatory baiting. (Ref: P12M 2025 spiking).</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Bagworm-02:</b> Trunk injection (Monocrotophos) for tall palms or chemical spraying for localized outbreaks.</p></div> <div class='policy-item'><p class='font-semibold'>Canopy Management</p><p class='text-sm text-gray-600'><b>Policy Ref: MAINT-PRUNE-02:</b> Tall palm blocks must prioritize progressive pruning to maintain harvester access. Under-pruned stretches must be cleared within one round.</p></div> <div class='policy-item'><p class='font-semibold'>Fertilizer & Soil</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> Prioritize EFB mulching (50 MT/ha) on sandy/lateritic soils to improve CEC and nutrient retention.</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                             <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                
                if (pinfosysDiv) {
                     pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = estateData.policy;
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
