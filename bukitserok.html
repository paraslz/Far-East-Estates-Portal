<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Bukit Serok - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="../index.html" class="flex items-center">
                    Ladang Bukit Serok Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "bukitserok",
                "name": "Ladang Bukit Serok",
                "reportInfo": "Data based on PA Report (March 2026) & Agronomy Report (February 2026). Visit Date: 16th March 2026.",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,226.37 ha",
                            "Mature: 2,058.80 ha",
                            "Prime Age (8-19y): 63%"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "25.13 / 21.86 MT",
                        "note": "Full Year 2025 (PAR Pg. 46)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 217.02 / RM 262.52",
                        "note": "Ex-Estate, Full Year 2025 (PAR Pg. 48)"
                    },
                    "labour": {
                        "title": "Labour Status",
                        "value": "1:14 ha Ratio",
                        "note": "161 Total Workers (PAR Pg. 14)"
                    },
                     "pests": {
                        "title": "P&D Status",
                        "value": "Bagworm Alert",
                        "note": "87% Owl Occupancy (PAR Pg. 31)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Status", "value": "161 Workers (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Bagworm Significant" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (2025)", "value": "19.21% (PAR Pg. 46)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Mech. Prod.", "value": "Badang: 10.1 MT/day" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "14-17 Days (PAR Pg. 43)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Manuring 2025", "value": "100% Complete" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [2825, 2243, 3126, 4262, 4769, 5427, 5519, 5639, 5803, 5763, 5565, 4479],
                        "rainfall": [232, 151, 97, 289, 155, 83, 30, 125, 122, 141, 366, 315],
                        "note": "*FFB Production (MT) and Rainfall (mm) data for full year 2025. Source: PAR Pg. 46."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years", "4-7 Years", "8-19 Years (Prime)", "20-25 Years (Old)", ">26 Years"],
                        "data": [0, 0, 63, 37, 0],
                        "title": "Ladang Bukit Serok - Palm Age Distribution (2026)",
                        "note": "*Source: PAR Pg. 10."
                    }
                },
                "observations": [
                    "<b>Strong Production Performance:</b> The estate produced 51,727.96 tons of FFB (25.13 MT/ha) in 2025, exceeding the budget by 15%. Yield is significantly above the target 21.86 MT/ha. <span class='observation-ref'>(PAR Pg. 46)</span>",
                    "<b>Under-pruning in Tall Palms:</b> Approximately 110 ha in blocks P01A and P02B are under-pruned. Corrective pruning is 9% complete as of Feb 2026 and must be expedited. <span class='observation-ref'>(PAR Pg. 5, 39, 40; AR Pg. 4)</span>",
                    "<b>Bagworm Control & Monitoring:</b> Bagworm remains a significant regional pest. Previous outbreaks in P08L/P09C were suppressed via trunk injection. Beneficial plants must be strictly maintained. <span class='observation-ref'>(PAR Pg. 5, 32; AR Pg. 41)</span>",
                    "<b>Replanting Strategy:</b> 160 ha of replanting (A4/A5) is planned for 2027, followed by Field P01A balance in 2028, to achieve an optimum age profile in tall palm areas. <span class='observation-ref'>(PAR Pg. 4, 10, 51)</span>",
                    "<b>Mechanization Efficiency:</b> Badang TIMAC units achieve 10.14 MT/day productivity, while Mini Crawlers are lower at 5.97 MT/day. Optimization of machine-to-harvester ratios is required. <span class='observation-ref'>(PAR Pg. 42)</span>",
                    "<b>Financial Efficiency:</b> 2025 Production cost was RM 217.02/ton (17% below budget). General charges (RM 1,525/ha) were 9% below budget despite high recruitment costs. <span class='observation-ref'>(PAR Pg. 17, 48)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Performance for 2025 was satisfactory. FFB production (51,728 MT) is 15% above budget, and the cost of production (RM 217.02/t) is 17% below budget. Management is urged to expedite corrective pruning in tall palm areas (P01A/P02B) and strictly monitor bagworm activities. (Source: PAR Pg. 7, 52)",
                        "Area Statement": "Total title area is 2,257.93 ha. Planted area is 2,226.37 ha (including division), all of which is mature. Replanting for 160 ha in P01A4/A5 is recommended for 2027 due to high height and density (160 palms/ha), with another 180.03 ha in 2028. (Source: PAR Pg. 9-10)",
                        "Labour Statement": "Current workforce is 161 workers (adequate ratio of 1:14 ha). Harvesters total 103 (ratio 1:22 ha). Weeding team of 9 is short of 3 workers. Checkroll includes 10 manuring workers, 3 security guards, and 4 line sweepers. (Source: PAR Pg. 14-15)",
                        "Staff Establishment": "Satisfactory with 11 personnel. Key changes: En Sa'aban (Senior Assistant Manager) joined Nov 2025; En Zulpikah (Account Executive) and two supervisors transferred from other estates in Jan 2026. (Source: PAR Pg. 12-13)",
                        "General Charges": "Actual RM 1,525.65/ha (9% below budget). Significant overspending noted in Labour Recruitment (+21%, RM 120k over budget), Executive Travel (+21%), and Labour Medical (+13%) due to high intake of 55 new workers. (Source: PAR Pg. 17-18, 53)",
                        "Upkeep and Cultivation": "• Weeding: Selective spray RM 206.47/ha (10% favorable). 2025 program 100% complete.\n• Manuring: 2025 program (3,038 MT) 100% applied. 2026 Feb progress at 23%.\n• Pests: Rat baiting (STORM) cost 47% below budget. Owl box occupancy at 87% (141/162 boxes).\n• Roads: grading 82% complete; laterite surfacing still required on soggy stretches. (Source: PAR Pg. 19-34)",
                        "Harvesting and Collection": "YTD (2025) Cost is RM 73.87/MT (6% favorable to budget). Interval 14-17 days. Mechanization: 13 Mini Crawlers (productivity 5.97 MT/day) and 7 Badang TIMAC (productivity 10.14 MT/day). (Source: PAR Pg. 42-44)",
                        "Crop Production": "2025 FFB Production 51,727.96 MT (115% vs budget of 45,000 MT). Mature yield 25.13 MT/ha. OER recorded at 19.21%. Feb 2026 production is also showing high surplus (142% vs budget). (Source: PAR Pg. 46-47)",
                        "Production Cost": "Ex-estate cost RM 217.02/MT (17% favorable to RM 262.52 budget). Breakdowns: General Charges RM 57.69/MT, Upkeep RM 85.46/MT, and Harvesting RM 73.87/MT. (Source: PAR Pg. 48)",
                        "Vehicles Running Cost": "Hilux running cost RM 0.59/km (below budget). Estate Van CEQ 6769 high at RM 1.48/km (budget RM 0.89) due to school transport repairs. TIMAC operating cost is RM 9.52/hr. (Source: PAR Pg. 50)",
                        "Capital Expenditure": "Total spent RM 642,746 in line with budget. Items: Canteen & Grocery shop (RM 201k), 1 unit Hilux (RM 125k), 1 unit Van (RM 132k), and 1 unit Electric Ginga 3 (RM 24k). (Source: PAR Pg. 49)",
                        "Immature": "N/A - 100% Mature Estate. (Source: PAR Pg. 9)"
                    },
                    "agronomy": {
                        "Executive Summary": "Visit conducted Feb 2026. Average yield for 2025 declined by 8.3% compared to 2024. Key issues include under-pruning in 110 ha of tall palms and managing localized bagworm outbreaks. (Source: AR Pg. 4-7)",
                        "Nutrient Inputs/Progress of Manuring": "2025 program (3,038.90 MT) 100% applied by Dec 2025. 2026 progress at 14.5% (Feb). EFB mulching in P02B2 at 50 MT/ha. (Source: AR Pg. 12-17)",
                        "Agronomic Observation": "Badang units achieve 11.23 MT/day. Blocks P01A and P02B show significant under-pruning. Barn owl occupancy 87%. Bagworm in P08L/P09C suppressed via trunk injection. (Source: AR Pg. 18-42)",
                        "Yield Performance": "2025 yield 24.89 MT/ha (AR records). 100% harvesting rounds achieved. Sharpest declines in P07K (-25.5%). (Source: AR Pg. 43-44)",
                        "Fertilizer Recommendation": "2026 program maintained. NK 2 specified for Field P01. A4/A5 manuring withdrawn for 2027 replanting. (Source: AR Pg. 46-49)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Pest & Disease Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-01:</b> Damage >10% triggers mandatory baiting. (Ref: PAR Pg. 30).</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Bagworm-02:</b> Trunk injection (Monocrotophos) for tall palms. Maintain beneficial plants (Casia/Antigonon) at 60:20:20 ratio.</p></div> <div class='policy-item'><p class='font-semibold'>Canopy Management</p><p class='text-sm text-gray-600'><b>Policy Ref: MAINT-PRUNE-02:</b> Tall palm blocks must prioritize progressive pruning to maintain access. Under-pruned stretches must be cleared within one round. (Ref: PAR Pg. 40).</p></div> <div class='policy-item'><p class='font-semibold'>Fertilizer & Soil</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> Prioritize EFB mulching (50 MT/ha) on sandy/lateritic soils to improve moisture and nutrient retention.</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-purple-50 text-purple-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                             <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600 whitespace-pre-line">${content}</p>`).join('');
                }
                
                if (pinfosysDiv) {
                     pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = estateData.policy;
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
