<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Dawn - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Dawn Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "dawn",
                "name": "Ladang Dawn",
                "reportInfo": "Based on PA Report (Feb 2026) & Agronomy Report (Feb 2026).",
                "visitDate": "11th Feb 2026 (PA) & 25th Feb 2026 (Agronomy)",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,762.32 ha",
                            "Mature: 1,739.32 ha",
                            "Immature: 23.00 ha",
                            "Prime-Age: 53% (AR Pg. 10)"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "28.04 / 21.85 MT",
                        "note": "Full Year 2025 (PAR Pg. 27; AR Pg. 52)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 208.76 / RM 276.31",
                        "note": "Ex-Estate, Full Year 2025 (PAR Pg. 29)"
                    },
                    "pruning": {
                        "title": "Pruning Status",
                        "value": "99ha Backlog",
                        "note": "Unsatisfactory in Tall Palms (AR Pg. 36)"
                    },
                     "pests": {
                        "title": "Rat Infestation",
                        "value": "Damage > 10%",
                        "note": "Exceeded threshold in Oct (AR Pg. 47)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:12 ha (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Rats High (>10%)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (CPO)", "value": "19.09%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Stand Density", "value": "140 SPH (AR Pg. 11)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "10-20 days (AR Pg. 25)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Bungor Series", "value": "42.45% (AR Pg. 19)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [3200, 3100, 3400, 4100, 4300, 3900, 3800, 4038, 4100, 4200, 5200, 5407],
                        "rainfall": [161.5, 82.0, 146.0, 249.5, 170.1, 84.5, 2.5, 116.5, 143.0, 146.0, 319.0, 331.0],
                        "note": "*FFB Trend Estimated; Rainfall 2025 Actuals (PAR Appendix 6)."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years", "4-7 Years", "8-19 Years", "20-25 Years", ">26 Years"],
                        "data": [0.0, 13.0, 53.0, 34.0, 0.0],
                        "title": "Ladang Dawn - Palm Age Distribution (2026)",
                        "note": "*Source: Agronomy Report 1/2026 Pg. 10."
                    }
                },
                "observations": [
                    "<b>Critical Rat Infestation & Baiting Needs:</b> October 2025 census revealed damage levels >10% in most blocks. Post-baiting in Jan 2026 shows improvement (reduced to ~8-10%), but systematic baiting repetition is needed in blocks still above threshold. <span class='observation-ref'>(AR Pg. 47, PAR Pg. 6)</span>",
                    "<b>Supply Planting & Stand Density Deficit:</b> Blocks P21L, P20K, and P19J exhibit a stand density deficit of 13-14 palms/ha (135 vs 148 SPH). No supply planting was executed in 2025; urgent supply is recommended to safeguard future yield potential. <span class='observation-ref'>(AR Pg. 10-11)</span>",
                    "<b>Pruning Backlogs vs Roadside Over-pruning:</b> A 99ha backlog exists in old plantings (P00A, P00B, P03C), primarily due to harvesters prioritizing high crops. However, roadside palms in P16F2 and P12H3 show signs of over-pruning which must be avoided to preserve canopy health. <span class='observation-ref'>(AR Pg. 5, 36-37, PAR Pg. 8, 24)</span>",
                    "<b>Fertilizer Application Quality:</b> While the 2025 program is 100% complete, slight lumping conditions were observed in P15D2. Correct broadcasting on frond heaps is vital, especially on Bungor soils (42% of estate) which are prone to leaching. <span class='observation-ref'>(AR Pg. 19, 59)</span>",
                    "<b>Harvesting Standards & Supervision:</b> Harvesting intervals are inconsistent (10-20 days). Overripe bunch incidences (up to 12%) and overnight bunch heaps in P03C5 indicate a need for tighter supervision and evacuation logistics. <span class='observation-ref'>(AR Pg. 25-29)</span>",
                    "<b>EFB Mulching & Ganoderma Risks:</b> High heaping of EFB in P03C3 was noted. Thick piles can foster excess moisture and slow decomposition, potentially creating environments favorable for Ganoderma boninense. <span class='observation-ref'>(AR Pg. 4, 23)</span>",
                    "<b>Flood Mitigation & Infrastructure:</b> Low-lying areas (6.75% of area) are prone to flooding. In 2025, 1,449 chains of desilting were completed, but road lateriting for soggy sections remains untouched. <span class='observation-ref'>(AR Pg. 55, PAR Pg. 21)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate's performance is satisfactory. FFB production (48,775 MT) is 28% above budget, and the cost of production (RM 208.76/mt) is 24% below budget. Management is urged to focus on clearing the 99ha pruning backlog and initiating a severe rodent damage campaign. (PAR Report, Pg. 8, 39)",
                        "Area Statement": "As of Feb 2026, the total planted area is 1,762.32 ha. This comprises: <br>• <b>Mature:</b> 1,739.32 ha (94.48%). <br>• <b>Immature:</b> 23.00 ha (1.25%). <br>• <b>Replanting:</b> Field P00A planned for 2027 due to currently strong yields (>24 mt/ha). (PAR Report, Pg. 10)",
                        "Labour Statement": "Current workforce is 163 workers vs requirement (Ratio 1:12 ha). <br>• <b>Harvesting/Pruning:</b> 90 workers (+4 surplus). <br>• <b>Nursery:</b> 22 workers. <br>• <b>Recruitment:</b> 57 recruited in 2025 (41 TKIs). (PAR Report, Pg. 13)",
                        "Staff Establishment": "Staffing is satisfactory with 11 personnel. Manager En. Muhamad Uzairi joined March 2025. Executive transferred in same month. Performance is satisfactory relative to estate condition. (PAR Report, Pg. 12)",
                        "General Charges": "Total General Charges are RM 1,735.21/ha, which is 5% below the budget of RM 1,826.05. <br>• <b>Overspending:</b> 'Labour and Amenities' due to minimum wage hike. 'Medical/VMO' (+200%) and 'Paid Leave' (+131%) due to Ordinary Rate of Payment (ORP) regulations. <br>• <b>Savings:</b> Offset by management/supervision and other expenditure headers. (PAR Report, Pg. 15-16)",
                        "Upkeep and Cultivation": "• <b>Weeding:</b> Cost is RM 187.46/ha (21% below budget). Overspraying noted; radius must be restricted to 2m. <br>• <b>Manuring:</b> RM 1,566.37/ha (6% below budget). 100% completed for 2025. <br>• <b>Pest & Disease:</b> RM 53.07/ha (79% below budget). Severe rat damage noted; deboling for Ganoderma in P03C in progress. (PAR Report, Pg. 17-20)",
                        "Harvesting and Collection": "YTD Cost is RM 71.97/MT, 6% below budget. <br>• <b>Interval:</b> Maintained at 15 days (24 rounds in 2025). <br>• <b>Quality:</b> Satisfactory with ripe crop >90% and good recovery. (PAR Report, Pg. 25-26)",
                        "Crop Production": "FFB Production is 48,775 MT (28.04 MT/ha), which is 28% above budget. <br>• <b>Yield/Ha:</b> 28.04 MT vs Budget 21.85 MT. <br>• <b>Extraction:</b> CPO at 19.09%. (PAR Report, Pg. 27)",
                        "Production Cost": "Ex-estate Cost of Production is RM 208.76/MT, 24% favorable compared to budget of RM 276.31/MT. <br>• <b>General Charges:</b> RM 61.88/MT. <br>• <b>Upkeep:</b> RM 74.91/MT. (PAR Report, Pg. 29)",
                        "Vehicles Running Cost": "Running costs generally below budget. <br>• <b>Toyota Hiace:</b> RM 0.54/km. <br>• <b>John Deere:</b> RM 18.18/hr. <br>• <b>Timac 02:</b> Higher cost due to low running hours. (PAR Report, Pg. 32)",
                        "Capital Expenditure": "Total Grand Total RM 2,288,015.62. Includes unbudgeted Toyota Hilux (RM 146k), Tube Well (RM 50k), and Biological Asset adjustments (RM 1.97m). (PAR Report, Pg. 33)",

                        "Nutrient Inputs/Progress of Manuring": "The 2025 program was completed with delays ranging from 0-3 months (Mix B) to 1-3 months (Compound). Fertilizer application quality shows improvement but localized 'slight lumping' persists in P15D2. Store conditions are tidy, although investigation is needed for a wet floor condition. EFB application in 2025 covered 246.74 ha (14,804.56 MT), providing vital organic matter to Bungor soils. (AR Pg. 18-21)",
                        "Agronomic Observation": "<b>Harvesting:</b> Intervals were inconsistent (10-20 days). Overripe bunches (up to 12%) found in P11E3 and P16F3. Overnight bunch heaps noted in P03C5. <br><b>Pests:</b> Rat baiting was executed in Nov/Dec 2025; post-baiting census in Jan 2026 shows reduction (~8-10%) but systematic baiting should continue. Barn owl occupancy is excellent (98%). <br><b>Thinning:</b> 88 runt palms thinned in 2025 (P12D, P20K). <br><b>Pruning:</b> Roadside palms are over-pruned; hanging dry fronds localized in P11E4 and P12M. (AR Pg. 25-48)",
                        "Yield Performance": "Yield performance shows a strong upward trend from 20.68 (2023) to 28.04 (2025). 53% of the estate area is in the peak productive phase (8-19 years). 118.29 ha (6.75% of area) is flood-prone; desilting work covered 1,449.51 chains in 2025 to improve drainage. (AR Pg. 52-55)",
                        "Fertilizer Recommendation": "The 2026 program prioritizes Mix B and NK2 applications. Due to the high percentage of Bungor series soils (42.45%), frond-stacking and application near frond heaps are critical strategies to minimize nutrient leaching and surface runoff. (AR Pg. 59-63)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Pruning & Canopy Management</p><p class='text-sm text-gray-600'><b>Policy Ref: PRUNE-OLD-01:</b> Pruning backlogs in tall mature areas must be cleared to improve harvesting efficiency. Avoid over-pruning roadside palms.</p></div> <div class='policy-item'><p class='font-semibold'>Pest Control (Rats)</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02a:</b> Systematic 100% baiting program must be implemented when damage exceeds 10%. (AR Pg. 47)</p></div> <div class='policy-item'><p class='font-semibold'>Fertilizer Application</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-01:</b> Ensure even broadcasting. Apply on frond heaps in Bungor soils to improve retention. (AR Pg. 59)</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Pruning') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-600 mb-6 italic border-l-4 border-green-800 pl-3">Visit Date: ${estate.visitDate} &bull; ${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2 text-green-900">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8 bg-gray-50 p-5 rounded-lg border border-gray-200"><h3 class="text-xl font-semibold mb-2 border-b border-gray-300 pb-2 text-red-900">Key Observations & Issues (PA & Agronomy)</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md font-semibold">Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-3">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-md hover:bg-gray-700 transition flex justify-between items-center"><span class="font-bold">Plantation Advisory Report Details</span> <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg></button>
                            <div id="${estate.id}-plantation" class="details-content bg-white p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-md hover:bg-gray-700 transition flex justify-between items-center"><span class="font-bold">Agronomy Report Details</span> <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg></button>
                            <div id="${estate.id}-agronomy" class="details-content bg-white p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-4 rounded-md hover:bg-gray-700 transition flex justify-between items-center"><span class="font-bold">Pinfosys Report Details</span> <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg></button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-white p-6 rounded-md border border-gray-200 shadow-inner"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#22c55e', '#eab308', '#ca8a04', '#a16207', '#713f12'] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-900 border-b pb-1 mb-2">${section}:</h4><div class="text-sm text-gray-600 leading-relaxed">${content}</div></div>`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-900 border-b pb-1 mb-2">${section}:</h4><div class="text-sm text-gray-600 leading-relaxed">${content}</div></div>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600 italic">Financial data from Pinfosys not available for this period.</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            function openPolicyModal() {
                const modalTitle = document.getElementById('modalTitle');
                const modalContent = document.getElementById('modalContent');
                modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
                modalContent.innerHTML = estateData.policy;
                document.getElementById('policyModal').classList.add('active');
            }

            window.closePolicyModal = function() {
                document.getElementById('policyModal').classList.remove('active');
            };

            renderEstate();
        });
    </script>
</body>
</html>
