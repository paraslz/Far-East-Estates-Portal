<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Bukit Jin - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="../index.html" class="flex items-center">
                    Ladang Bukit Jin Report
                </a>
            </div>
            <a href="../estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JS -->
        </div>
    </div>
    
    <!-- Policy Modal -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "bukitjin",
                "name": "Ladang Bukit Jin",
                "reportInfo": "Data based on PA Report (January 2026 - Visit 12 Mar 2026) & Agronomy Report (November 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,071.50 ha",
                            "Mature: 1,648.60 ha",
                            "Immature: 306.50 ha",
                            "Replanting: 116.40 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "23.88 / 20.93 MT",
                        "note": "Full Year 2025 (PAR Pg. 33)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 219.58 / RM 264.94",
                        "note": "Ex-Estate, 2025 (PAR Pg. 37)"
                    },
                    "ganoderma": {
                        "title": "Ganoderma Status",
                        "value": "47.52% (Critical)",
                        "note": "Census 431.6 ha (PAR Pg. 23)"
                    },
                     "pests": {
                        "title": "Key Pests",
                        "value": "Bagworms & Rats",
                        "note": "Drone Treatment Done (PAR Pg. 22)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:14 ha (Surplus)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "High (Ganoderma)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (2025)", "value": "18.73%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": ">2.0 MT/md (Good)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "14 days (Excellent)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Manuring Status", "value": "Minor Delivery Delay" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [2800, 2950, 3100, 3400, 3800, 3500, 3300, 3450, 3200, 3350, 3500, 3021],
                        "rainfall": [193.0, 357.0, 225.0, 504.0, 205.0, 121.0, 15.0, 97.0, 209.0, 164.0, 348.0, 180.0],
                        "note": "*FFB production estimates and actual rainfall data for 2025 (Source: PAR Pg. 62)."
                    },
                    "ageProfile": {
                        "labels": ["Immature (14.6%)", "Young Mature (7.3%)", "Prime (46.8%)", "Old Mature (31.3%)"],
                        "data": [14.6, 7.3, 46.8, 31.3],
                        "title": "Ladang Bukit Jin - Palm Age Distribution (Jan 2026)",
                        "note": "*Source: PAR Pg. 11-12."
                    }
                },
                "observations": [
                    "<b>Ganoderma Escalation:</b> Infestation rate in census area has hit 47.52%. Significant risk of yield loss. De-boling and root exposure are proactive measures being implemented. <span class='observation-ref'>(PAR Pg. 23, 47)</span>",
                    "<b>Strong 2025 Performance:</b> FFB production achieved 23.88 MT/ha, a 14% surplus over budget. Ex-estate cost RM 219.58 was 17% below budget. <span class='observation-ref'>(PAR Pg. 33, 37, 47)</span>",
                    "<b>Labour Surplus:</b> Workforce increased to 151, a surplus of 16 relative to requirements. Ratio is now 1:14 ha, which is considered adequate. <span class='observation-ref'>(PAR Pg. 14)</span>",
                    "<b>Pest Management:</b> Bagworm treatment across 684.21 ha successfully utilized drone spraying for high palms. Rat damage >10% detected in blocks P10A, P09B, P02C, P07D, and P20H. <span class='observation-ref'>(PAR Pg. 22)</span>",
                    "<b>Manuring Minor Delays:</b> 2025 program faced delays due to supplier issues (Mix B). Semi-mechanized application via Timac was used to speed up recovery. <span class='observation-ref'>(PAR Pg. 21, 47)</span>",
                    "<b>Drainage Improvement:</b> Major desilting and bund elevation in low-lying areas (P22L, P23M) successfully minimized palm mortality during recent floods. <span class='observation-ref'>(PAR Pg. 25, 48)</span>",
                    "<b>Replanting Success:</b> Planting of P25E (116.4 ha) was completed in Dec 2025. P24N (174.4 ha) shows satisfactory growth and ablation started in Feb 2026. <span class='observation-ref'>(PAR Pg. 42-44)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Overall estate performance for 2025 was satisfactory. FFB production was 23.88 mt/ha (14% above budget) at an ex-estate cost of RM 219.58/mt (17% below budget). Key focus remains on Ganoderma control (47.52% infestation), maintaining the improved labour ratio (1:14 ha), and optimizing machine productivity for in-field collection. (PAR Pg. 47-48)",
                        "Area Statement": "Total planted area is 2,071.50 ha. This comprises 1,648.60 ha Mature (78.3%), 306.50 ha Immature (14.56%), and 116.40 ha Replanting (5.53%). Topography is flat/undulating with low-lying flood-prone areas. (PAR Pg. 11)",
                        "Labour Statement": "Workforce increased to 151 (27 Checkroll, 124 Contract), representing a surplus of 16 workers. Ratio: 1 worker per 14 ha. Harvester ratio is 1:18 ha, sufficient for cropping and upkeep requirements. (PAR Pg. 14)",
                        "Staff Establishment": "Staffing levels are adequate. En Muhammad Nazhif joined as Executive on 15 July 2025. (PAR Pg. 13)",
                        "General Charges": "Cost RM 1,495.94/ha (9% below budget). Overspending noted on EPF (+69% due to wage increase), Recruitment (+78% for 52 TKIs), and Water (+165% due to consumption/leaks). (PAR Pg. 16-18)",
                        "Upkeep and Cultivation": "Total RM 1,959.38/ha. Weeding (RM 220.92/ha) is 9% below budget (smaller area covered). Manuring (RM 1,321.23/ha) 6% below budget. P&D (RM 99.90/ha) 51% below budget due to delays in census/treatment. Road grading 24% below budget. (PAR Pg. 19-27)",
                        "Harvesting and Collection": "Average interval is 14 days (25.92 rounds). Standard and FFB quality satisfactory. Cost RM 74.88/mt (6% below budget) aided by high yields and use of prime mover bins. (PAR Pg. 31-32)",
                        "Crop Production": "2025 Production was 39,371.44 mt (14% surplus). Yield per ha 23.88 mt. CPO OER 18.73% vs budget 19.07%. Q1 2026 production expected to be strong. (PAR Pg. 33)",
                        "Production Cost": "Ex-estate cost RM 219.58/mt (-17% vs budget). Components: General Charges RM 62.64, Upkeep RM 82.05, Harvesting RM 74.89. All categories below budget. (PAR Pg. 37)",
                        "Vehicles Running Cost": "Running costs in order. Hilux CEA 6263 RM 0.93/km. John Deere BLR 1723 RM 23.54/hr. Van Higer costs high (RM 1.49/km) due to extensive repairs. (PAR Pg. 46)",
                        "Capital Expenditure": "Unbudgeted purchase of HP Probook laptop for Manager in Jan 2025 (RM 5,610). (PAR Pg. 45)",
                        "Immature": "P22L: 54.1 ha matured Jan 2026. P23M: Scout started June 2025; raised bunds for low-lying area. P24N: Ablation started Feb 2026; growth satisfactory. (PAR Pg. 38-43)"
                    },
                    "agronomy": {
                        "Executive Summary": "Visit Date: 17 Nov 2025. 2024 Yield was acceptable at 23.07 MT/Ha. Manuring for 2024 was completed, but 2025 program faces delays (Mix B, GML). Ganoderma (33%) and Bagworms (180 ha) are major concerns. (Source: AR 2/2025, Pg. 4-6)",
                        "Nutrient Inputs": "2024 program completed. 2025 delays: Mix-B (83% applied), GML (41% applied) due to supplier shortage. NK2 rejected due to caking. EFB application limited to 290.8 ha (P24N, P25E). (Source: AR 2/2025, Pg. 11-13)",
                        "Agronomic Observation": "Pruning: Satisfactory generally. Weed Control: Good, soft grasses dominate. Pests: Bagworm aerial spray planned for late Nov 2025. Rat damage >10% in multiple blocks. Ganoderma: Upper Stem Rot (USR) signs detected. (Source: AR 2/2025, Pg. 19-32)",
                        "Yield Performance": "2024 Yield: 23.07 MT/Ha. YTD Oct 2025 Yield: ~19.8 MT/Ha. Yield fluctuation observed but recovery is acceptable. Block P20H showing strong yield improvement. (Source: AR 2/2025, Pg. 48-49)",
                        "Replanting & Supply": "P25E (116.4 ha): Land prep ongoing, planting started 10 Nov 2025. P23M: 2 ha vacant due to flooding; requires bund raising. P24N: Stunted palms replaced. (Source: AR 2/2025, Pg. 39-44)",
                        "Fertilizer Recommendation (2026)": "Program detailed in Appendix 1. Focus on catching up with delayed 2025 applications first. (Source: AR 2/2025, Pg. 54)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>"
            };

            const chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass} shadow-sm"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass} shadow-sm"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in border border-gray-200">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details (PAR 1/2026)</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details (Nov 2025)</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800 underline underline-offset-2">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800 underline underline-offset-2">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Bukit Jin';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
