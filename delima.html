<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Delima - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Delima Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JS -->
        </div>
    </div>
    
    <!-- Modal -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "delima",
                "name": "Ladang Delima",
                "reportInfo": "Data based on PA Report (August 2025) & Agronomy Report 1/2026 (Visit Date: 26th January 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,792.65 ha",
                            "Mature: 2,589.27 ha",
                            "Replanting: 203.38 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual 2025)",
                        "value": "9.88 MT",
                        "note": "16% decline from 2024 (AR Pg. 55)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (YTD Jul '25 vs Budget)",
                        "value": "RM 416.05 / RM 389.72",
                        "note": "7% higher than budget (PA Report)"
                    },
                    "age": {
                        "title": "Age Category dominant",
                        "value": "20-25 Years",
                        "note": "62% of total area (AR Pg. 9)"
                    },
                     "pests": {
                        "title": "Pest Status",
                        "value": "Rat Damage 11%",
                        "note": "Above 10% threshold in some blocks (AR Pg. 43)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:18 ha (Short by 25 workers)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Rat damage resurging (AR Pg. 5)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER Status", "value": "Impacted by rainfall (AR Pg. 4)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvest Interval", "value": "Extended by Floods (AR Pg. 4)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Stand Per Ha", "value": "137 (Census 2025 - AR Pg. 10)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z' /></svg>", "label": "Fertilizer Status", "2025 Program": "100% Complete (AR Pg. 12)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["2020", "2021", "2022", "2023", "2024", "2025"],
                        "ffb": [16.57, 13.69, 12.43, 10.14, 11.70, 9.88],
                        "rainfall": [3551, 4221, 4565, 4918, 2453, 3449],
                        "note": "*Annual FFB Yield (MT/Ha) and Rainfall (mm). Source: AR 1/2026, Pg. 15, 54, 55."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years", "8-19 Years (Prime)", "20-25 Years (Old Mature)"],
                        "data": [7, 31, 62],
                        "title": "Ladang Delima - Palm Age Distribution (Jan 2026)",
                        "note": "*Profile is skewed toward older palms. Source: AR 1/2026, Pg. 9."
                    }
                },
                "observations": [
                    "<b>Poor Yield Relative to Potential:</b> FFB yield dropped to 9.88 MT/ha in 2025, which is 16% lower than 2024. The estate's age profile is heavily skewed, with 62% of palms aged 20-25 years, past their prime phase. <span class='observation-ref'>(AR Pg. 10, 53-55)</span>",
                    "<b>Water Management & Capillary Rise:</b> 79% of the estate is flood-prone and 81% is peat soil. Heavy monsoon rains (Nov-Dec 2025 totaling 1,290mm) caused root submergence. The estate is urged to collect data on capillary rise to determine site-specific optimal water tables. <span class='observation-ref'>(AR Pg. 22, 56)</span>",
                    "<b>Resurging Rat Damage:</b> Post-baiting census in Dec '25/Jan '26 showed damage averaging 11%, with some blocks as high as 18%. This exceeds the 10% threshold, requiring follow-up baiting. <span class='observation-ref'>(AR Pg. 5, 43)</span>",
                    "<b>Extended Harvesting Intervals:</b> Rain and flooding have extended intervals, resulting in significant overripe bunches (up to 12% in P06B1). Crop recovery needs immediate corrective measures. <span class='observation-ref'>(AR Pg. 4, 18-19)</span>",
                    "<b>Field Vegetation Deterioration:</b> Bare ground has increased to 45% of the estate area due to monsoon flooding and waterlogging. Only 26% is covered with soft grasses and Nephrolepis. <span class='observation-ref'>(AR Pg. 5, 34-35)</span>",
                    "<b>Replanting Delays:</b> The 2024 replanting program was delayed and only completed in April 2025 (P25J). The 2025 program (P25K) was completed in Sept 2025. <span class='observation-ref'>(AR Pg. 6, 46)</span>",
                    "<b>Labour Shortage:</b> Persistent worker shortage (short by 25) continues to strain operations, although 20 new workers were expected in late 2025. <span class='observation-ref'>(PAR Pg. 13-14)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate's performance is hampered by low FFB yield and high production costs. Key issues are the labour shortage, severe rodent damage in specific fields, and delays in the manuring program. Positive developments include improved harvesting intervals (~15 days) and better water management initiatives. (Source: PAR, Pg. 49-52)",
                        "Area Statement": "Total planted area is 2,792.65 ha. This consists of 2,589.27 ha mature palms and 203.38 ha for the 2025 replanting program. (Source: PAR, Pg. 11)",
                        "Labour Statement": "The estate is short by 25 workers. The harvester ratio is 1:28 ha. 20 new workers are expected by the end of August. (Source: PAR, Pg. 13-14)",
                        "Staff Establishment": "The staff complement is adequate. Recommend personnel receive more training on peatland management. (Source: PAR, Pg. 15-16)",
                        "General Charges": "YTD July 2025 expenditure was 30% lower than budget. Overspending noted on executive travel and MSPO charges. (Source: PAR, Pg. 17-18)",
                        "Upkeep and Cultivation": "2025 manuring program delayed. Drain desilting completed; road grading done in May. (Source: PAR, Pg. 19-34)",
                        "Harvesting and Collection": "FFB quality satisfactory (>90% ripe bunches). Intervals improved to 15 days in August. (Source: PAR, Pg. 35-36)",
                        "Crop Production": "YTD July 2025 production was 13,034 MT, 28% below budget. (Source: PAR, Pg. 37)",
                        "Production Cost": "Ex-estate cost per tonne RM 416.05, 7% higher than budget. (Source: PAR, Pg. 41)",
                        "Immature": "Planting of 81.17 ha in P25J completed May 2025. P25K (122.21 ha) ready for planting. (Source: PAR, Pg. 43-47)"
                    },
                    "agronomy": {
                        "Executive Summary": "Yield performance has been unsatisfactory, dropping 16% in 2025. Age profile is skewed to old palms (62%). Heavy rainfall and floods extended harvesting intervals, increasing overripe bunches. Rat damage resurged to 11% average. 2025 manuring program was fully completed in Nov '25. (Source: AR 1/2026, Pg. 4-6, 55)",
                        "Nutrient Inputs/Progress of Manuring": "2025 program (RP, Mixture B, NK2) was 100% completed by Nov 2025 (Pg. 12). Some issues with broken pallets in the store were noted (Pg. 13). Use of sachet bags for physical control of release is proposed for trial (Pg. 16).",
                        "Agronomic Observation": "Harvesting intervals extended by floods (up to 27 days in Dec '25); standards show 10-12% overripe bunches (Pg. 18-20). Palm vigor improved along main drains (Pg. 26). Progressive pruning achieved 97% completion for 2nd round (Pg. 29). Bare ground increased to 45% due to flooding (Pg. 34).",
                        "Yield Performance": "2025 yield of 9.88 MT/ha is significantly lower than potential. Palms aged 20-25 years dominate (1,729.8 ha). The estate needs to investigate yield-limiting factors via capillary rise data. (Source: AR 1/2026, Pg. 10, 53-55)",
                        "Fertilizer Recommendation": "No changes to the 2026 fertilizer program. Scheduled NK3, Mix B, and RP applications detailed in Appendix 1a-c (Pg. 60-63)."
                    },
                    "pinfosys": {
                        "summary": "Not Available (Refer to PAR for high-level financial data)."
                    }
                },
                "policy": "<div class='policy-item'><p class='font-semibold'>Pest Control (Rats)</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If census fresh damage exceeds 10%, a follow-up baiting round (1 bait per palm) is required until bait take drops below 20%. (Source: AR 1/2026, Pg. 44)</p></div><div class='policy-item'><p class='font-semibold'>Peat Water Management</p><p class='text-sm text-gray-600'><b>Policy Ref: PEAT-WM-01:</b> Maintenance of main drains in free-flowing condition is required to ensure efficient water discharge and optimize root aeration. (Source: AR 1/2026, Pg. 5, 24)</p></div><div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-CYCLE-01:</b> Efforts must be maintained to adhere to a 15-day harvesting cycle to minimize overripe bunch incidence. (Source: AR 1/2026, Pg. 18)</p></div><div class='policy-item'><p class='font-semibold'>Ground Cover</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-GC-03:</b> Encourage growth of soft ferns (Nephrolepis) in peat areas to conserve soil moisture and prevent desiccation. (Source: AR 1/2026, Pg. 39)</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-red-50 text-red-800' :
                                       metric.title.includes('Labour') ? 'bg-purple-50 text-purple-800' : 'bg-orange-50 text-orange-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">FFB Yield & Rainfall Trend</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Distribution</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues (PA & Agronomy)</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                             <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                
                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Yield (MT/Ha)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { 'y-ffb': { position: 'left' }, 'y-rainfall': { position: 'right' } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                if (plantationDiv) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">${estateData.reports.pinfosys.summary}</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        document.getElementById(id).classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => {
                    document.getElementById('modalTitle').innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
                    document.getElementById('modalContent').innerHTML = estateData.policy;
                    document.getElementById('policyModal').classList.add('active');
                });
            }

            renderEstate();
        });

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
