<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang DSK - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang DSK Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "dsk",
                "name": "Ladang DSK",
                "reportInfo": "Based on Planting Advisory Report 1/2026 (Visit Date: 22 Jan 2026) & Agronomy Report 1/2026 (Visit Date: 30 Jan 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,309.03 ha",
                            "Prime Age (8-19 yrs): 100%",
                            "Terrain: 45% Bungor (Erosion risk)",
                            "Low-lying Area: 237.4 ha (18%)"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (2025 vs Budget)",
                        "value": "24.45 / 22.34 MT",
                        "note": "9% above budget (Source: PAR)"
                    },
                    "cost": {
                        "title": "Cost of Production (2025)",
                        "value": "RM 261.65 / RM 273.56",
                        "note": "4% favorable vs Budget (Source: PAR)"
                    },
                    "manuring": {
                        "title": "Manuring Status (2025)",
                        "value": "100% Complete",
                        "note": "Finalized in December 2025 (AR Pg. 11)"
                    },
                     "pests": {
                        "title": "Pest Status",
                        "value": "High (Rats)",
                        "note": "Census exceeds 10% in sub-blocks (AR Pg. 35)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M15 21a6 6 0 00-9-5.197m0 0A5.975 5.975 0 0112 13a5.975 5.975 0 01-3 5.197z' /></svg>", "label": "Labour Ratio", "value": "1:12 ha (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Rat Infestation Spike" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (2025)", "value": "19.40%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "2.74 MT (Crawler)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "10-20 days" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path d='M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10' /></svg>", "label": "Manuring Status", "value": "100% Completed" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["2021", "2022", "2023", "2024", "2025"],
                        "ffb": [15.83, 18.74, 15.24, 22.76, 24.45],
                        "rainfall": [1916.0, 2266.5, 2802.5, 2548.0, 2945.7],
                         "note": "Source: Agronomy Report 1/2026, Pg. 38, 44"
                    },
                    "ageProfile": {
                        "labels": ["Prime Mature Palms (8-19 years)"],
                        "data": [100],
                        "title": "Ladang DSK - Palm Age Distribution",
                        "note": "Source: Agronomy Report 1/2026, Pg. 9"
                    }
                },
                "observations": [
                    "<b>Yield & Productivity:</b> 2025 yield recorded at 24.45 MT/Ha, a 30.7% improvement since 2022. Highest yield recorded in sub-block P13B2 (30.43 MT/ha). <span class='observation-ref'>(AR Pg. 38-39; PAR Pg. 30)</span>",
                    "<b>Rat Damage Spike:</b> Significant rat damage noted in P13C (16.0%) and P14D (12.0%). Immediate baiting rounds are required to suppress population build-up. <span class='observation-ref'>(AR Pg. 35)</span>",
                    "<b>Infrastructure Damage:</b> A 5-foot culvert was washed away in field P13C5 during monsoon floods. Replacement with a concrete bridge is proposed. <span class='observation-ref'>(PAR Pg. 6, 22-23)</span>",
                    "<b>Flood Impacts:</b> Low-lying areas (237.4 ha) experience messy fronds post-flooding, hindering loose fruit collection. Circle racking is recommended after flood events. <span class='observation-ref'>(AR Pg. 18, 45)</span>",
                    "<b>Soil Management:</b> 45% of the area (Bungor series) has low CEC and high erosion risk. Systematic frond stacking and soft vegetation establishment are critical. <span class='observation-ref'>(AR Pg. 41-43)</span>",
                    "<b>Pest Management:</b> Elephant intrusions damage young shoots in P15I2. Night patrol siren units are recommended for better deterrent efficiency. <span class='observation-ref'>(AR Pg. 37, PAR Pg. 20)</span>",
                    "<b>Manuring Programme:</b> 2025 program was completed in Dec. Mixture B delivery delays noted due to supplier issues. 2026 program must minimize schedule gaps. <span class='observation-ref'>(AR Pg. 11, PAR Pg. 19)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate's performance was satisfactory with FFB production of 32,275.12 MT (24.45 MT/ha), which is 9% above the annual budget. The production cost of RM 261.65/MT was 4% lower than the budget. Management is urged to focus on improving access in hilly/terraced areas, preventing elephant intrusions, and maintaining stricter security for external FFB transport. <span class='observation-ref'>(PA Report, Pg. 37-38)</span>",
                        "Area Statement": "As of Dec 2025, total planted area is 1,320.30 ha. This comprises:<br>• <b>Mature:</b> 1,320.30 ha (100%).<br>• <b>Terrain:</b> 48% Hilly, 37% Low-lying, 15% Flat/Undulating.<br>• <b>Challenges:</b> Surface runoff in hilly areas and drainage issues in low-lying areas. <span class='observation-ref'>(PA Report, Pg. 10)</span>",
                        "Labour Statement": "Current workforce is 107 workers vs requirement of 98 (Ratio 1:12 ha).<br>• <b>Harvesters:</b> 69 workers (Ratio 1:19 ha).<br>• <b>Recruitment:</b> 23 new workers recruited in 2025.<br>• <b>Status:</b> Adequate, but distribution should follow job demand. <span class='observation-ref'>(PA Report, Pg. 13)</span>",
                        "Staff Establishment": "The staff establishment is satisfactory.<br>• <b>Key Movements:</b> En. Mohd Afiq Bin Mansor (Officer In-Charge) transferred 1 Mar 2025; En. Muhammad Azamuddin (Asst. Manager) transferred 16 Nov 2025; Cik Iman Nurhaifa (Account Clerk) transferred 1 Sep 2025. <span class='observation-ref'>(PA Report, Pg. 12)</span>",
                        "General Charges": "Total General Charges are <b>RM 1,712.60/ha</b>, which is 3% below the budget of RM 1,768.08/ha.<br>• <b>Overspending:</b> 'Medical' (+272% due to higher costs), 'Water-Labour' (+121% due to leakages), 'EPF' (+83% due to min wage hike), 'Group Personal Insurance' (+100%).<br>• <b>Savings:</b> Offset by savings in other administrative headers. <span class='observation-ref'>(PA Report, Pg. 14-16)</span>",
                        "Upkeep and Cultivation": "Total cost RM 2,255.58/ha (4.5% above budget).<br>• <b>Weeding:</b> Cost is RM 233.19/ha (Satisfactory, consistent with budget). Focus required on soft grasses.<br>• <b>Manuring:</b> Cost is RM 1,556.54/ha (9% above budget). 2025 program fully completed in Nov.<br>• <b>Pest & Disease:</b> Cost is RM 70.95/ha (6% above budget). Measures include rat baiting and elephant trenching. <span class='observation-ref'>(PA Report, Pg. 17-20)</span>",
                        "Harvesting and Collection": "YTD Cost is <b>RM 99.32/MT</b>, slightly higher than budget (RM 97.81/MT) due to higher external transport costs to Merchong Oil Mill.<br>• <b>Interval:</b> Maintained at 12-15 days.<br>• <b>Quality:</b> Satisfactory with >95% ripe crop. <span class='observation-ref'>(PA Report, Pg. 28, 33)</span>",
                        "Crop Production": "YTD (12 Months) FFB Production is <b>32,275.12 MT</b>, which is 9% above the budget of 29,500 MT.<br>• <b>Yield/Ha:</b> 24.45 MT/ha.<br>• <b>Stand per Ha:</b> 133 palms.<br>• <b>Avg Bunch Weight:</b> 15.66 kg. <span class='observation-ref'>(PA Report, Pg. 30-31)</span>",
                        "Production Cost": "YTD Ex-Estate Cost of Production is <b>RM 261.65/MT</b>, which is 4% favorable compared to the budget of RM 273.56/MT.<br>• <b>General Charges:</b> RM 70.06/MT (-11%).<br>• <b>Upkeep:</b> RM 92.27/MT (-6%).<br>• <b>Harvesting:</b> RM 99.32/MT (+1.5%). <span class='observation-ref'>(PA Report, Pg. 33)</span>",
                        "Vehicles Running Cost": "Vehicle costs are generally satisfactory.<br>• <b>Hilux (CEF 9629):</b> RM 0.63/km (8% above budget).<br>• <b>Tractor (LDSK01):</b> RM 21.06/hr (4% above budget).<br>• <b>Van Higer:</b> RM 1.30/km (In line with budget). <span class='observation-ref'>(PA Report, Pg. 36)</span>",
                        "Capital Expenditure": "• <b>Labour Quarters:</b> Pending JTK approval.<br>• <b>Solar Street Lighting:</b> Cancelled.<br>• <b>Guard Post:</b> In progress.<br>• <b>Office Partition:</b> Completed. <span class='observation-ref'>(PA Report, Pg. 34)</span>",
                        "Immature": "Not Applicable (100% Mature Estate). <span class='observation-ref'>(PA Report, Pg. 10)</span>"
                    },
                    "agronomy": {
                        "Executive Summary": "Agronomy visit conducted 30 Jan 2026. Estate yield is encouraging (24.45 MT/ha). Prime aged palms (11-12 yrs) benefit from high bunch weight. Major agronomic focus is required on rat infestation exceeding thresholds and soil erodibility on Bungor/Rengam series. <span class='observation-ref'>(AR Pg. 7, 38)</span>",
                        "Nutrient Inputs/Progress of Manuring": "2025 manuring program completed by Dec 2025 despite Mixture B delivery delays. Fertilizer placement improved in low-lying/terrace areas. For 2026, Mixture B and RP are the primary recommendations. <span class='observation-ref'>(AR Pg. 11-13, 46)</span>",
                        "Agronomic Observation": "Harvesting interval ranges 10-20 days. Minimal crop losses in field. Pruning is 100% complete and satisfactory. Ground vegetation is sparse with exposed bare soil, indicating suboptimal development. Rat damage averaged 9.2% in Oct 2025, but spiked in P13C (16%). Elephant intrusions damage shoots in P15I2. <span class='observation-ref'>(AR Pg. 16-37)</span>",
                        "Yield Performance": "Yield improved 7% vs 2024. Palms reaching peak production at 11-12 years. Soil analysis identifies Bungor series (45%) and Rengam series (21%) as dominant, both having low CEC and high erosion risk. <span class='observation-ref'>(AR Pg. 39-41)</span>",
                        "Fertilizer Recommendation": "2026 Programme detailed in Appendix 1(a-c). RP applied at 1.5-2.0 kg/palm. Mixture B at 2.0-2.5 kg/palm. minimize application schedule gaps. <span class='observation-ref'>(AR Pg. 46-49)</span>"
                    },
                     "pinfosys": {
                        "summary": "Not Available."
                    }
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Pest Control (Rats)</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-01:</b> Baiting is mandatory when fresh damage exceeds 10%. Implement systematic single-direction baiting. <span class='observation-ref'>(AR Pg. 35)</span></p></div> <div class='policy-item'><p class='font-semibold'>Fertilizer Placement</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-03:</b> Avoid broadcasting near drain edges or terrace lips. Plastic bowls preferred over containers to ensure even distribution. <span class='observation-ref'>(AR Pg. 13)</span></p></div> <div class='policy-item'><p class='font-semibold'>Infrastructure Maintenance</p><p class='text-sm text-gray-600'><b>Policy Ref: MAINT-ROAD-03:</b> Proper drainage and road maintenance are crucial for timely crop evacuation, especially in low-lying areas. <span class='observation-ref'>(AR Pg. 19, 45)</span></p></div>"
            };


            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Manuring') ? 'bg-purple-50 text-purple-800' : 'bg-red-50 text-red-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-1 text-gray-900">${estate.name}</h2>
                        <p class="text-md text-gray-600 mb-2">Based on Planting Advisory Visit (Jan 2026) & Agronomy Visit (Jan 2026)</p>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">5-Year Yield vs. Rainfall Trend</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details (Jan 2026)</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details (Jan 2026)</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Yield (MT/Ha)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Yield (MT/Ha)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#16a34a', '#facc15', '#ef4444'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: false }, legend: { position: 'bottom' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                Object.keys(estateData.reports).forEach(reportType => {
                    const div = document.getElementById(`${estateData.id}-${reportType}`);
                    if (div) {
                        const reportData = estateData.reports[reportType];
                        if (reportData && Object.keys(reportData).length > 0) {
                            if (reportData.summary === "Not Available") {
                                div.innerHTML = `<p>Not Available.</p>`;
                            } else {
                                div.innerHTML = Object.entries(reportData).map(([section, content]) => {
                                    const formattedSection = section.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
                                    return `<h4 class="font-semibold mt-3 text-gray-800">${formattedSection}:</h4><p class="text-sm text-gray-600">${content}</p>`
                                }).join('');
                            }
                        } else {
                             div.innerHTML = `<p>Not Available.</p>`;
                        }
                    }
                });
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estate) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estate.name}`;
            modalContent.innerHTML = estate.policy || "<p>No specific policies are cross-referenced for this report.</p>";
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
