<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Sungai Rasau - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Sungai Rasau Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "sgrasau",
                "name": "Ladang Sungai Rasau",
                "reportInfo": "Data based on PA Report 2/2025 (Visit: 20th Nov 2025) & Agronomy Report 1/2026 (Visit: 22nd Apr 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 111.00 ha",
                            "Mature: 111.00 ha",
                            "Immature: 0 ha",
                            "Replanting: 58.30 ha (in 2027)"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual)",
                        "value": "24.27 MT",
                        "note": "Full Year 2025 (Source: AR 1/2026)"
                    },
                    "cost": {
                        "title": "Cost/Tonne (Actual vs Budget)",
                        "value": "RM 253.84 / RM 299.27",
                        "note": "Ex-Estate, YTD Oct 2025 (Source: PAR 2/2025)"
                    },
                    "manuring": {
                        "title": "Manuring Status",
                        "value": "Delayed (0% Done)",
                        "note": "2026 program impacted by labor shortage"
                    },
                     "pests": {
                        "title": "Pest & Disease Status",
                        "value": "Controlled",
                        "note": "Bagworm treated, Rats <5%, Gano present"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:22 ha (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Controlled (Gano monitoring)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (YTD Oct '25)", "value": "19.00%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "2.25 MT/md" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "15 days (Acceptable)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "Mild K Def., Low Mg" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [193.01, 176.22, 204.11, 211.35, 181.32, 181.50, 184.30, 203.26, 204.31, 303.35, 300.09, 214.04],
                        "rainfall": [235, 42, 82, 189, 397, 19, 195, 141, 155, 184, 1048.5, 1431],
                        "note": "*2025 Monthly FFB Production vs Rainfall. (Source: AR 1/2026, Pg. 31, 32)"
                    },
                    "ageProfile": {
                        "labels": ["8-19 Years (Prime)", "20-25 Years (Old)", ">26 Years (Old)"],
                        "data": [15, 49, 36],
                        "title": "Ladang Sungai Rasau - Palm Age Distribution (2026)",
                        "note": "*Majority of estate is >19Y. Replanting planned for 2027. (Source: AR 1/2026 Pg. 8)"
                    }
                },
                "observations": [
                    "<b>Replanting Plan (2027):</b> Over 85% of palms are old or aging. Replanting is confirmed for 2027 covering 58.30 ha (53% of estate) in blocks P96A, P98D, and P02E. Fertilizer programs for these blocks have been withdrawn. <span class='observation-ref'>(AR 1/2026 Pg. 9; PAR 2/2025 Pg. 9)</span>",
                    "<b>Harvesting Constraints & Pruning Backlog:</b> Harvesting is challenging in older blocks (P96A, P98D) due to 'supertall' palms (>50ft) and a skirting of dry hanging fronds. Pruning is under-performed across most blocks due to worker restructuring, with only P05F completing the first round. <span class='observation-ref'>(AR 1/2026 Pg. 13-15; PAR 2/2025 Pg. 22)</span>",
                    "<b>Manuring Delays (2026):</b> While 2025 manuring was completed, the 2026 application is severely delayed (0% applied as of April 2026) due to a shortage of workers following permit renewal issues. Catch-up is urgently required. <span class='observation-ref'>(AR 1/2026 Pg. 12)</span>",
                    "<b>Pest Control (Bagworms & Rats):</b> Bagworm infestation in P98D was successfully treated via trunk injection (Acephate/Impact-75) in March 2026 with positive results. Rat damage remains low (<5%) supported by 100% barn owl box occupancy (1 box/9 ha). <span class='observation-ref'>(AR 1/2026 Pg. 22-24; PAR 2/2025 Pg. 25)</span>",
                    "<b>Ganoderma Infection:</b> Ganoderma symptoms (wilting, unopened spears, palm collapse) are present, notably in P96A (261 palms) and P98D (126 palms). Regular monitoring and deboling are recommended. <span class='observation-ref'>(AR 1/2026 Pg. 23)</span>",
                    "<b>Nutrient Status:</b> Mild Potassium (K) deficiency symptoms observed in isolated areas (P10C, P05F, P02E). Foliar analysis also indicates sub-optimal Magnesium (Mg). <span class='observation-ref'>(AR 1/2026 Pg. 18)</span>",
                    "<b>Infrastructure Issues:</b> Road grading has not been carried out recently, leading to soggy stretches that require surfacing with crusher run. <span class='observation-ref'>(PAR 2/2025 Pg. 21)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Performance is acceptable. FFB production is 1% higher than budget, and costs are 16% lower. The labour ratio is adequate at 1:22 ha with multi-tasking practiced. Key issues are delayed pruning in tall palms, delayed manuring (Mix B), and lack of road grading. (Source: PAR 2/2025, Pg. 36-37)",
                        "Area Statement": "As of Oct 2025, total mature planted area is <b>111.00 ha</b>. Age profile: 95.9% Old Mature (>19 years) and 4.1% Prime Mature. Replanting of 58.3 ha (P96A, P98D, P02E) is proposed for 2027. (Source: PAR 2/2025, Pg. 9)",
                        "Labour Statement": "Total workforce is 9 workers (Req: 10).<br>• <b>Harvesters:</b> Strength is adequate (1:22 ha). Productivity is 2.25 tons/man-day.<br>• <b>General:</b> Multi-tasking is implemented to cover upkeep shortages. (Source: PAR 2/2025, Pg. 11)",
                        "Upkeep and Cultivation": "• <b>Weeding:</b> Cost is 27% lower than budget, but noxious weeds persist in open areas.<br>• <b>Pruning:</b> Behind schedule in P96A, P98D, and P02E.<br>• <b>Manuring:</b> Mix B application is delayed.<br>• <b>Infrastructure:</b> Road grading was not done this year. (Source: PAR 2/2025, Pg. 16-26)",
                        "Crop Production": "YTD Oct FFB production is <b>2,042.73 MT</b> (1% above budget).<br>• <b>Yield/ha:</b> 18.40 MT.<br>• Highest yield in P10C (26.60 MT/ha), lowest in P96A (15.45 MT/ha). (Source: PAR 2/2025, Pg. 31-32)",
                        "Production Cost": "Ex-estate cost is <b>RM 253.84/MT</b> (15% lower than budget).<br>• <b>Upkeep:</b> 14% higher than budget due to bagworm treatment.<br>• <b>Harvesting:</b> 4% lower than budget. (Source: PAR 2/2025, Pg. 34)",
                        "Vehicles & Machinery": "Tractor and Timac running costs are within or below budget. Timac productivity is 10.83 tons/day. (Source: PAR 2/2025, Pg. 35)"
                    },
                    "agronomy": {
                        "Executive Summary": "Agronomy visit conducted on 22nd April 2026. Agronomic conditions are generally acceptable except for unsatisfactory pruning progress. Pest populations are under control. The 2026 manuring programme is heavily delayed due to labour shortages. Full-year 2025 yield recorded 24.27 MT/ha. (Source: AR 1/2026, Pg. 7, 27)",
                        "Blocking & Replanting Plan": "Total area is 111.0 ha. Over 85% of the estate is composed of old/aging palms. Replanting of blocks P96A, P98D, and P02E is scheduled for 2027 (58.30 ha / 53% of estate). (Source: AR 1/2026, Pg. 8-9)",
                        "Nutrient Inputs/Progress of Manuring": "The 2025 programme was completed satisfactorily. For 2026, 0% of the required 41.80 MT has been applied as of April 2026 due to worker shortages (unrenewed permits). Catch-up application is urgently required. (Source: AR 1/2026, Pg. 11-12)",
                        "Agronomic Observation": "• <b>Harvesting:</b> Intervals average 15 days, but 'supertall' palms (>50ft) in P96A/P98D are causing harvesting difficulties and crop losses due to hanging fronds.<br>• <b>Pruning:</b> Slow progress. Only P05F completed the first round. Most fields are under-pruned.<br>• <b>Weeding:</b> Acceptable. First round inter-row weeding completed. (Source: AR 1/2026, Pg. 13-19)",
                        "Pest & Disease Control": "• <b>Rats:</b> Infestation remains below economic threshold. Barn owl boxes have 100% occupancy (1 box/9 ha).<br>• <b>Ganoderma:</b> Infections noted in P96A (261 palms) and P98D (126 palms). Deboling recommended.<br>• <b>Bagworms:</b> Treated with Impact-75 (Acephate) trunk injection in March 2026 for block P98D with positive results. (Source: AR 1/2026, Pg. 22-24)",
                        "Yield Performance": "Full Year 2025 yield recorded 24.27 MT/ha (a 5.4% deficit against 2024). YTD March 2026 yield is 5.92 MT/ha (16.6% increase compared to the same period last year). (Source: AR 1/2026, Pg. 25-26)",
                        "Fertilizer Recommendation": "Programme revised for 2026. Replanting blocks (P96A, P98D, P02E) have fertilizer withdrawn to prepare for 2027 felling. Remaining blocks prescribed Mix B, NK 1, and RP. (Source: AR 1/2026, Pg. 28-29)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Pest Management</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-CENSUS-01:</b> Pest censuses for rats and leaf-eating pests must be conducted quarterly to enable early detection and timely intervention.</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p></div> <div class='policy-item'><p class='font-semibold'>Infrastructure</p><p class='text-sm text-gray-600'><b>Policy Ref: MAINT-INFRA-02:</b> Critical infrastructure such as bridges and main outlet drains must be repaired immediately to prevent disruption to field operations and mitigate flooding.</p></div> <div class='policy-item'><p class='font-semibold'>Canopy Management</p><p class='text-sm text-gray-600'><b>Policy Ref: PRUNE-TALL-01:</b> Supertall palms that cannot be safely harvested or pruned should be identified and scheduled for removal/replanting to eliminate safety risks and prevent crop loss.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p></div>"
            };


            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Manuring') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const renderSection = (reportObj, divId) => {
                    const div = document.getElementById(divId);
                    if (div && reportObj && reportObj !== "Not Available") {
                        div.innerHTML = Object.entries(reportObj).map(([section, content]) => 
                            `<div class="mb-4"><h4 class="font-bold text-gray-900">${section}:</h4><div class="text-sm text-gray-700 mt-1 space-y-1">${content}</div></div>`
                        ).join('');
                    } else if (div) {
                        div.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                    }
                };

                renderSection(estateData.reports.agronomy, `${estateData.id}-agronomy`);
                renderSection(estateData.reports.plantation, `${estateData.id}-plantation`);
                renderSection(estateData.reports.pinfosys, `${estateData.id}-pinfosys`);
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Pest Management</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-CENSUS-01:</b> Pest censuses for rats and leaf-eating pests must be conducted quarterly to enable early detection and timely intervention.</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p></div> <div class='policy-item'><p class='font-semibold'>Infrastructure</p><p class='text-sm text-gray-600'><b>Policy Ref: MAINT-INFRA-02:</b> Critical infrastructure such as bridges and main outlet drains must be repaired immediately to prevent disruption to field operations and mitigate flooding.</p></div> <div class='policy-item'><p class='font-semibold'>Canopy Management</p><p class='text-sm text-gray-600'><b>Policy Ref: PRUNE-TALL-01:</b> Supertall palms that cannot be safely harvested or pruned should be identified and scheduled for removal/replanting to eliminate safety risks and prevent crop loss.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Sungai Rasau';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
